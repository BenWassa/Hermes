name: Build The Daily

on:
  workflow_dispatch: {}
  schedule:
    # Two crons cover the DST shift. The build gate skips whichever cron runs
    # second (checking git history), so there is never a double-build.
    - cron: "0 10 * * *"   # 06:00 EDT (summer, UTC-4)
    - cron: "0 11 * * *"   # 06:00 EST (winter, UTC-5)

permissions:
  contents: write

concurrency:
  group: build-the-daily
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build gate (skip scheduled run if today's edition already published)
        id: gate
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TODAY=$(TZ=America/Toronto date +%Y-%m-%d)
          LAST=$(TZ=America/Toronto git log -1 --format=%cd --date=format-local:'%Y-%m-%d' -- docs/index.html 2>/dev/null || echo "")
          echo "Today (ET): $TODAY  Last build (ET): ${LAST:-never}"
          if [ "$LAST" = "$TODAY" ]; then
            echo "Edition for $TODAY already published; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No edition yet for $TODAY; proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Build edition
        if: steps.gate.outputs.skip != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          NYT_API_KEY: ${{ secrets.NYT_API_KEY }}
          CURATE_MODEL: ${{ vars.CURATE_MODEL }}
          PAGES_URL: ${{ vars.PAGES_URL }}
        run: python -m src.build

      - name: Commit and push docs/
        if: steps.gate.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "chore(edition): publish $(TZ=America/Toronto date +'%Y-%m-%d') edition"
            git push
          fi

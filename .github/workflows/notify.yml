name: Notify The Daily

on:
  workflow_dispatch: {}
  # Fires automatically after "Build The Daily" finishes, so the push only
  # goes out once a fresh edition actually exists.
  workflow_run:
    workflows: ["Build The Daily"]
    types:
      - completed

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Notify gate (require a fresh edition published today)
        id: gate
        run: |
          # Manual runs always notify.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch; notifying."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Only notify when the triggering build actually succeeded.
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "Build did not succeed (conclusion=${{ github.event.workflow_run.conclusion }}); skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Confirm today's edition was actually committed (guards the
          # build's own "already published, nothing to do" skip path).
          #
          # Every scheduled build slot finishes "success" and triggers this
          # workflow, even the no-op reruns that fire after the day's edition
          # is already published. Gating on "today's edition exists" alone
          # therefore fires once per slot -> the duplicate pushes. So require
          # that *this* build run actually produced the edition: its commit
          # must be newer than the triggering run's own start time. A no-op
          # rerun makes no commit, so the latest edition commit predates its
          # start and it correctly stays silent.
          TODAY=$(TZ=America/Toronto date +%Y-%m-%d)
          LAST=$(TZ=America/Toronto git log -1 --format=%cd --date=format-local:'%Y-%m-%d' -- docs/index.html 2>/dev/null || echo "")
          COMMIT_EPOCH=$(git log -1 --format=%ct -- docs/index.html 2>/dev/null || echo 0)
          RUN_STARTED="${{ github.event.workflow_run.run_started_at }}"
          RUN_STARTED_EPOCH=$(date -u -d "$RUN_STARTED" +%s 2>/dev/null || echo 0)
          echo "Today (ET): $TODAY  Last edition (ET): ${LAST:-never}"
          echo "Edition commit epoch: $COMMIT_EPOCH  Build run started: $RUN_STARTED ($RUN_STARTED_EPOCH)"
          if [ "$LAST" = "$TODAY" ] && [ "$COMMIT_EPOCH" -ge "$RUN_STARTED_EPOCH" ]; then
            echo "Edition was produced by this build run; notifying."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "Edition not produced by this run (already published earlier, or none today); skipping push."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push notification (ntfy.sh)
        if: steps.gate.outputs.skip != 'true'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          PAGES_URL: ${{ vars.PAGES_URL }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "NTFY_TOPIC secret not set; skipping push." && exit 0
          fi
          URL="${PAGES_URL:-https://BenWassa.github.io/Hermes/}"
          curl -fsS \
            -H "Title: The Daily — $(TZ=America/Toronto date +'%b %-d')" \
            -H "Click: ${URL}" \
            -H "Tags: newspaper" \
            -d "Today's edition is ready." \
            "https://ntfy.sh/${NTFY_TOPIC}"

name: Notify The Daily

on:
  workflow_dispatch: {}
  schedule:
    # 07:00 ET, two crons for DST; gate accepts 07–10 ET to absorb runner lag.
    - cron: "0 11 * * *"   # 07:00 EDT (summer, UTC-4)
    - cron: "0 12 * * *"   # 07:00 EST (winter, UTC-5)

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify gate (skip outside 07:00–10:59 ET delivery window)
        id: gate
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HOUR=$(TZ=America/Toronto date +%H)
          echo "Toronto hour: $HOUR"
          # Window 07–10 absorbs up to ~4h of GitHub Actions scheduling lag.
          if [ "$HOUR" -ge 7 ] && [ "$HOUR" -le 10 ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "Outside delivery window (hour=$HOUR); skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push notification (ntfy.sh)
        if: steps.gate.outputs.skip != 'true'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          PAGES_URL: ${{ vars.PAGES_URL }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "NTFY_TOPIC secret not set; skipping push." && exit 0
          fi
          URL="${PAGES_URL:-https://BenWassa.github.io/Hermes/}"
          curl -fsS \
            -H "Title: The Daily — $(TZ=America/Toronto date +'%b %-d')" \
            -H "Click: ${URL}" \
            -H "Tags: newspaper" \
            -d "Today's edition is ready." \
            "https://ntfy.sh/${NTFY_TOPIC}"

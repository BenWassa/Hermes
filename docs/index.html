  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #efece6; }
    body {
      font-family: 'Georgia', serif;
      color: #111;
      -webkit-font-smoothing: antialiased;
    }
    #app {
      min-height: 100vh;
      background: #fff;
      max-width: 680px;
      margin: 0 auto;
    }

    /* Masthead */
    .masthead {
      border-bottom: 4px solid #1a2744;
      padding: 18px 20px 14px;
      background: #fff;
    }
    .masthead .date {
      font-size: 11px; color: #999; letter-spacing: 0.1em;
      text-transform: uppercase; margin-bottom: 4px;
    }
    .masthead .title {
      font-size: 38px; font-weight: 700; letter-spacing: -0.01em;
      color: #1a2744; line-height: 1; margin-bottom: 2px;
    }
    .masthead .tagline {
      font-family: 'Arial', sans-serif; font-size: 10px; color: #999;
      letter-spacing: 0.18em; text-transform: uppercase;
    }

    /* Weather strip */
    .weather {
      background: #1a2744; color: #fff; cursor: pointer; user-select: none;
    }
    .weather .summary {
      display: flex; align-items: center; gap: 16px;
      padding: 10px 20px; overflow-x: auto; scrollbar-width: none;
    }
    .weather .summary::-webkit-scrollbar { display: none; }
    .weather .ico { font-size: 22px; }
    .weather .city { font-weight: 700; font-size: 15px; }
    .weather .temp { font-size: 15px; }
    .weather .muted { opacity: 0.7; font-size: 13px; white-space: nowrap; }
    .weather .chev { margin-left: auto; opacity: 0.6; font-size: 12px; }
    .weather .week {
      display: flex; border-top: 1px solid rgba(255,255,255,0.12);
      padding: 10px 20px; overflow-x: auto; scrollbar-width: none;
    }
    .weather .week::-webkit-scrollbar { display: none; }
    .weather .day {
      text-align: center; min-width: 52px; padding: 0 8px;
      border-right: 1px solid rgba(255,255,255,0.1);
    }
    .weather .day .d { font-size: 11px; opacity: 0.6; margin-bottom: 4px; }
    .weather .day .i { font-size: 18px; }
    .weather .day .hi { font-size: 13px; font-weight: 700; margin-top: 4px; }
    .weather .day .lo { font-size: 11px; opacity: 0.5; }

    /* Tab nav */
    .tabs {
      display: flex; overflow-x: auto; border-bottom: 2px solid #1a2744;
      background: #fff; scrollbar-width: none; position: sticky; top: 0; z-index: 10;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 12px 18px; border: none; background: none;
      cursor: pointer; font-family: 'Georgia', serif; font-size: 13px;
      font-weight: 400; color: #666; border-bottom: 3px solid transparent;
      margin-bottom: -2px; letter-spacing: 0.04em; text-transform: uppercase;
      transition: color 0.15s;
    }
    .tab.active { font-weight: 700; color: #1a2744; border-bottom-color: #1a2744; }

    /* Stories */
    .stories { padding: 0 20px 40px; }
    .card {
      border-top: 1px solid #ddd; padding: 14px 0; cursor: pointer;
      background: #fff; transition: background 0.15s;
    }
    .card.lead { border-top: 3px solid #1a2744; padding: 20px 0 16px; }
    .card.open { background: #f8f7f4; }
    .card .row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .card .kicker {
      font-family: 'Arial', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; color: #8b1a1a; margin-bottom: 6px; text-transform: uppercase;

    .card .tag {

      font-size: 9px; border-radius: 2px;
    }
    .card .headline {

    }
    .card.lead .headline { font-size: 22px; }
    .card .sub {
      font-size: 14px; color: #444; line-height: 1.4; margin-bottom: 4px; font-style: italic;
    }
    .card .time { font-family: 'Arial', sans-serif; font-size: 11px; color: #999; margin-top: 4px; }
    .card .toggle { color: #bbb; font-size: 18px; flex-shrink: 0; margin-top: 2px; }
    .card .expand {
      margin-top: 14px; padding-top: 14px; border-top: 1px solid #e0ddd8;
      font-size: 15px; color: #333; line-height: 1.7;
    }

    .card .readmore {

      text-decoration: none;

ences.", "time": "Yesterday", "tag": null, "sensitivity": false, "image": "https://media.guim.co.uk/a8b94eb91f68a60185f4e0b5796464789c345468/659_0_2813_2250/500.jpg", "link": "https://www.theguardian.com/world/live/2026/jun/27/europe-heatwave-germany-poland-france-uk-temperature-heat-latest-news-updates"}, {"id": "w3", "lead": false, "kicker": "GLOBAL HEALTH", "headline": "The Last Continent: How Deadly Bird Flu Travelled the World Before Landing on a Remote Australian Beach", "sub": "The H5N1 virus has now reached every continent on the planet. What does it mean for some of the world’s unique species?", "summary": "The deadly H5N1 bird flu virus has now spread to every continent, recently appearing on a remote Australian beach. This global reach raises serious concerns for the world's unique species and ecosystems. Experts are assessing the potential impact on wildlife populations and the broader implications for global health.", "time": "Yesterday", "tag": null, "sensitivity": false, "image": "https://media.guim.co.uk/58af6e10fc3c89f71da2c186c0d493796368e5ef/1365_37_2534_2027/500.jpg", "link": "https://www.theguardian.com/world/2026/jun/28/bird-flu-travelled-world-remote-australian-beach"}, {"id": "w4", "lead": false, "kicker": "TECHNOLOGY", "headline": "‘Tech Firms Are Losing the Public’: Social Media Age Bans Near Tipping Point", "sub": "UK is latest country to set a minimum age for social media but big tech is fighting back globally against curbs.", "summary": "Public sentiment against tech firms is growing as social media age bans approach a tipping point, with the UK being the latest country to implement a minimum age. Major tech companies are globally resisting these new curbs and regulations. This ongoing battle highlights increasing concerns over online safety and the influence of social media on younger users.", "time": "11:00 AM", "tag": null, "sensitivity": false, "image": "https://media.guim.co.uk/ea503ade6ee6157d7267471bc11c2b8cbd80df59/1_0_4998_4000/500.jpg", "link": "https://www.theguardian.com/world/2026/jun/28/tech-firms-are-losing-the-public-social-media-age-bans-near-tipping-point"}]}, {"id": "sports", "label": "Sports", "stories": [{"id": "s1", "lead": true, "kicker": "CRICKET", "headline": "England v New Zealand: Third Men’s Cricket Test, Day Four – Live", "sub": "Join our writers for updates from the fourth day at Trent Bridge in the deciding Test of the series.", "summary": "The third men's cricket Test between England and New Zealand is underway on day four at Trent Bridge, with live updates available. This match is the deciding Test of the series, promising a thrilling conclusion. Fans are eagerly following the action as both teams vie for victory.", "time": "11:34 AM", "tag": "LIVE", "sensitivity": false, "image": "https://media.guim.co.uk/997f691eff41cb3bac33f7526dd7064eeeb45836/0_0_4599_3680/500.jpg", "link": "https://www.theguardian.com/sport/live/2026/jun/28/england-v-new-zealand-third-mens-cricket-test-day-four-live"}, {"id": "s2", "lead": false, "kicker": "BOXING", "headline": "Jaron Ennis Survives Scare to Stop Xander Zayas and Unify 154lb Titles in Instant Classic", "sub": "Jaron ‘Boots’ Ennis survived the toughest test of his career before stopping Xander Zayas in the seventh round to unify the WBA and WBO titles at 154lb.", "summary": "Jaron 'Boots' Ennis overcame the toughest challenge of his career, stopping Xander Zayas in the seventh round to unify the WBA and WBO 154lb titles. Ennis embraced the hostile Brooklyn crowd, which he credited with fueling his biggest career win. He has now set his sights on achieving undisputed glory in the division.", "time": "9:45 AM", "tag": "FINAL", "sensitivity": false, "image": "https://media.guim.co.uk/4ecea7ef5d0f1021f7d0218b91e1f1bb6fe10893/259_0_3628_2903/500.jpg", "link": "https://www.theguardian.com/sport/2026/jun/28/jaron-boots-ennis-xander-zayas-quotes-post-fight-fundora-ortiz"}, {"id": "s3", "lead": false, "kicker": "CRICKET", "headline": "England Thrash New Zealand by Nine Wickets to Eliminate Them from Women’s T20 Cricket World Cup", "sub": "England sail into the semi-finals undefeated after an unbeaten 89 from Danni Wyatt-Hodge thrills record Oval crowd.", "summary": "England has decisively defeated New Zealand by nine wickets, eliminating them from the Women's T20 Cricket World Cup. Danni Wyatt-Hodge's unbeaten 89 thrilled a record Oval crowd, propelling England into the semi-finals undefeated. This dominant performance solidifies England's position as a strong contender in the tournament.", "time": "Yesterday", "tag": "FINAL", "sensitivity": false, "image": "https://media.guim.co.uk/ac82d347b9d4af88966c0d1865c507407c34d7df/569_262_2906_2326/500.jpg", "link": "https://www.theguardian.com/sport/live/2026/jun/27/england-v-new-zealand-womens-t20-world-cup-live"}, {"id": "s4", "lead": false, "kicker": "TENNIS", "headline": "Sinner and Sabalenka Lead Players’ Protests at Wimbledon Over Prize Money Share", "sub": "The world’s leading players were true to their word at Wimbledon on Saturday as they limited their media appearances to protest over prize money.", "summary": "Jannik Sinner and Aryna Sabalenka are leading player protests at Wimbledon over the distribution of prize money, limiting their media appearances on Saturday. Top players are advocating for a larger share of the tournament's earnings, highlighting ongoing tensions between athletes and organizers. This collective action aims to bring attention to their financial concerns.", "time": "Yesterday", "tag": null, "sensitivity": false, "image": "https://media.guim.co.uk/570321a43096ed7fc2465ea26a185e42cccc1086/378_0_3457_2767/500.jpg", "link": "https://www.theguardian.com/sport/2026/jun/27/tennis-players-protests-prize-money-wimbledon-jannick-sinner-aryna-sabalenka"}]}, {"id": "business", "label": "Business", "stories": [{"id": "b1", "lead": true, "kicker": "RETAIL", "headline": "Ocado Boss Tim Steiner’s Near £100m in Pay Raises ‘Serious Concerns   <script>
    (function () {
      var raw = document.getElementById('edition').textContent;
      var data;
      try {
        data = JSON.parse(raw);
      } catch (e) {
        document.getElementById('app').innerHTML =
          '<div class="notice">No edition loaded. Run the build to generate today’s paper.</div>';
        return;
      }

      var state = { active: (data.sections[0] || {}).id, openId: null };

      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function weatherHtml(w) {
        if (!w || !w.icon) return '';
        var week = (w.week || []).map(function (d) {
          return '<div class="day"><div class="d">' + esc(d.day) + '</div>' +
            '<div class="i">' + esc(d.icon) + '</div>' +
            '<div class="hi">' + esc(d.hi) + '°</div>' +
            '<div class="lo">' + esc(d.lo) + '°</div></div>';
        }).join('');
        return '<div class="weather" id="weather">' +
          '<div class="summary">' +
            '<span class="ico">' + esc(w.icon) + '</span>' +
            '<span class="city">Toronto</span>' +
            '<span class="temp">' + esc(w.high) + '° / ' + esc(w.low) + '°</span>' +
            '<span class="muted">' + esc(w.condition) + '</span>' +
            '<span class="muted">Rain ' + esc(w.rain) + '</span>' +
            '<span class="muted">Wind ' + esc(w.wind) + '</span>' +
            '<span class="chev" id="wchev">▼</span>' +
          '</div>' +
          '<div class="week" id="wweek" style="display:none">' + week + '</div>' +
        '</div>';
      }

      function tabsHtml() {
        return '<div class="tabs">' + data.sections.map(function (s) {
          return '<button class="tab' + (s.id === state.active ? ' active' : '') +
            '" data-tab="' + esc(s.id) + '">' + esc(s.label) + '</button>';
        }).join('') + '</div>';
      }

      function cardHtml(st) {
        var open = st.id === state.openId;
        var tag = st.tag ? '<span class="tag">' + esc(st.tag) + '</span>' : '';
        var kicker = st.kicker ? '<div class="kicker">' + tag + esc(st.kicker) + '</div>' : '';
        var sub = st.sub ? '<div class="sub">' + esc(st.sub) + '</div>' : '';
        var expand = '';
        if (open) {
          var img = st.image ? '<img src="' + esc(st.image) + '" alt="" loading="lazy" />' : '';
          var link = st.link
            ? '<a class="readmore" href="' + esc(st.link) + '" target="_blank" rel="noopener">Read full story →</a>'
            : '';
          expand = '<div class="expand">' + img + esc(st.summary) + '<br>' + link + '</div>';
        }
        return '<div class="card' + (st.lead ? ' lead' : '') + (open ? ' open' : '') +
          '" data-card="' + esc(st.id) + '">' +
          '<div class="row"><div style="flex:1">' + kicker +
            '<div class="headline">' + esc(st.headline) + '</div>' + sub +
            '<div class="time">' + esc(st.time) + '</div></div>' +
            '<div class="toggle">' + (open ? '−' : '+') + '</div>' +
          '</div>' + expand +
        '</div>';
      }

      function storiesHtml() {
        var section = data.sections.filter(function (s) { return s.id === state.active; })[0];
        if (!section) return '';
        return '<div class="stories">' + section.stories.map(cardHtml).join('') + '</div>';
      }

      function render() {
        document.getElementById('app').innerHTML =
          '<div class="masthead">' +
            '<div class="date">' + esc(data.date) + '</div>' +
            '<div class="title">THE DAILY</div>' +
            '<div class="tagline">Toronto · World · Business · Sport</div>' +
          '</div>' +
          weatherHtml(data.weather) +
          tabsHtml() +
          storiesHtml() +
          '<div class="footer">THE DAILY · TORONTO · Tap any headline to read</div>';
        bind();
      }

      function bind() {
        var weather = document.getElementById('weather');
        if (weather) {
          weather.addEventListener('click', function () {
            var week = document.getElementById('wweek');
            var chev = document.getElementById('wchev');
            var showing = week.style.display !== 'none';
            week.style.display = showing ? 'none' : 'flex';
            chev.textContent = showing ? '▼' : '▲';
          });
        }
        Array.prototype.forEach.call(document.querySelectorAll('.tab'), function (btn) {
          btn.addEventListener('click', function () {
            state.active = btn.getAttribute('data-tab');
            state.openId = null;
            render();
          });
        });
        Array.prototype.forEach.call(document.querySelectorAll('.card'), function (card) {
          card.addEventListener('click', function (ev) {
            if (ev.target.closest('a')) return; // let the read-more link work
            var id = card.getAttribute('data-card');
            state.openId = state.openId === id ? null : id;
            render();
          });
        });
      }

      render();
    })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #efece6; }
    body {

    #app {

      background: #fff;

    .masthead {
      border-bottom: 4px solid #1a2744;
      padding: 18px 20px 14px;
      background: #fff;

    }

    /* Weather strip */
    .weather {
      background: #1a2744; color: #fff; cursor: pointer; user-select: none;

    .weather .day .hi { font-size: 13px; font-weight: 700; margin-top: 4px; }
    .weather .day .lo { font-size: 11px; opacity: 0.5; }

    /* Tab nav */
    .tabs {

sel-prices-us-iran-war.html"}, {"id": "b2", "lead": false, "kicker": "AVIATION", "headline": "Why did Ryanair-Air Malta plane window blow out mid-air and could it happen again?", "sub": "Passenger Ljubisa Karović was nearly sucked out of his seat when Boeing 737-800’s window blew out on flight from Greece.", "summary": "A Ryanair-Air Malta Boeing 737-800 experienced a mid-air window blowout on a flight from Greece, nearly sucking passenger Ljubisa Karović out of his seat. Authorities are investigating the cause of the incident and assessing the potential for recurrence. This alarming event raises serious questions about aircraft safety and maintenance protocols.", "time": "6:00 AM", "tag": null, "sensitivity": false, "image": "https://media.guim.co.uk/a97565fb4c0a771b38df7952df2fdcfe80c1f181/827_0_4417_3533/500.jpg", "link": "https://www.theguardian.com/business/2026/jul/16/why-did-ryanair-air-malta-plane-window-blow-out-mid-air-and-could-it-happen-again"}, {"id": "b3", "lead": false, "kicker": "TECHNOLOGY", "headline": "India Is Moving Fast to Catch Up in A.I. A Coastal City Fears the Fallout.", "sub": "With India lagging in the technology, officials are embracing giant data centers. But critics say the megaprojects will use up energy and water, without providing long-term jobs.", "summary": "India is rapidly advancing its AI capabilities by embracing large-scale data centers, despite concerns from a coastal city about the environmental and social fallout. Critics argue these megaprojects will deplete energy and water resources without creating sustainable long-term employment. This push for technological advancement highlights a growing debate over its true cost and benefits.", "time": "1:22 AM", "tag": null, "sensitivity": false, "image": "https://static01.nyt.com/images/2026/07/11/multimedia/00int-india-ai-01-tfhg/00int-india-ai-01-tfhg-superJumbo.jpg", "link": "https://www.nytimes.com/2026/07/16/world/asia/india-ai-data-centers-google.html"}, {"id": "b4", "lead": false, "kicker": "RETAIL", "headline": "Ocado chief says he won’t be a ‘puppet master’ amid apparent succession row", "sub": "Tim Steiner speaks as shares in the online grocer slide nearly 15% on plunge in pre-tax profits to £17m.", "summary": "Ocado chief Tim Steiner has stated he will not be a \"puppet master\" amidst an apparent succession dispute within the company. His comments come as shares in the online grocer plummeted nearly 15% following a sharp decline in pre-tax profits to £17 million. The leadership uncertainty and financial downturn are creating significant challenges for Ocado.", "time": "8:54 AM", "tag": null, "sensitivity": false, "image": "https://media.guim.co.uk/7bb53110dc885b08fa688ab421c619e477071ac3/536_0_4145_3316/500.jpg", "link": "https://www.theguardian.com/business/2026/jul/16/ocado-chief-puppet-master-succession-tim-steiner"}]}, {"id": "opinion", "label": "Opinion", "stories": [{"id": "o1", "lead": true, "kicker": "EDITORIAL", "headline": "The Guardian view on Keir Starmer’s farewell: a dignified departure and a necessary one", "sub": "Editorial: The outgoing prime minister was on good form during his sometimes emotional last PMQs. But Labour MPs were right that change was needed.", "summary": "Keir Starmer's farewell as prime minister was a dignified and necessary departure, marked by an emotional final Prime Minister's Questions. While Starmer maintained good form, Labour MPs correctly identified the need for change within the party. This editorial supports the transition, emphasizing that new leadership was essential for the party's future direction.", "time": "Yesterday", "tag": "EDITORIAL", "sensitivity": false, "image": "https://media.guim.co.uk/6eb00c2af22d50022b042744bc971667da8290bf/831_0_5186_4148/500.jpg", "link": "https://www.theguardian.com/commentisfree/2026/jul/15/the-guardian-view-on-keir-starmers-farewell-a-dignified-departure-and-a-necessary-one"}, {"id": "o2", "lead": false, "kicker": "HEALTH", "headline": "Cyclospora is easy for doctors to miss. The US made it even harder to spot", "sub": "Last year the federal government downgraded active surveillance for this parasite. Now thousands are sick.", "summary": "Cyclospora, a parasite often missed by doctors, has become even harder to detect after the US federal government downgraded its active surveillance last year. This policy change has coincided with thousands of people falling ill from the parasite. The author argues that this decision has exacerbated a public health issue, making outbreaks more challenging to control.", "time": "10:00 AM", "tag": null, "sensitivity": false, "image": "https://media.guim.co.uk/fc2965d1341665fa191483137e2d6814c40df1b4/333_0_3333_2667/500.jpg", "link": "https://www.theguardian.com/commentisfree/2026/jul/16/diarrhea-outbreak-cyclospora-parasite-cdc"}, {"id": "o3", "lead": false, "kicker": "INTERNATIONAL LAW", "headline": "Why does the US want to ‘dismantle’ the international criminal court?", "sub": "Marco Rubio has offered nonsensical rationale in attacking the court. The Trump administration’s real goal is impunity.", "summary": "The US's desire to 'dismantle' the International Criminal Court (ICC) is driven by a pursuit of impunity, not the nonsensical rationale offered by figures like Marco Rubio. The author argues that the Trump administration's true objective is to shield individuals from accountability for alleged crimes. This stance undermines international justice and the rule of law.", "time": "9:00 AM", "tag": null, "sensitivity": false, "image": "https://media.guim.co.uk/7f5d3b5c704b50f2df2cdb271e344283bb519d8e/417_0_4167_3333/500.jpg", "link": "https://www.theguardian.com/commentisfree/2026/jul/16/international-criminal-court-marco-rubio"}, {"id": "o4", "lead": false, "kicker": "EDITORIAL", "headline": "The Guardian view on obesity: put public health before food industry pressure", "sub": "Editorial: Obesity reflects prices, advertising and access, not simply weak willpower. Ministers must now act.", "summary": "Obesity is a complex public health crisis influenced by food prices, advertising, and access, rather than simply individual willpower. This editorial argues that ministers must prioritize public health over pressure from the food industry. Strong government action is needed to address the systemic factors contributing to rising obesity rates.", "time": "Yesterday", "tag": "EDITORIAL", "sensitivity": false, "image": "https://media.guim.co.uk/76f942f41947736fffc59db9dfeeb64f339c6466/0_0_3540_2832/500.jpg", "link": "https://www.theguardian.com/commentisfree/2026/jul/15/the-guardian-view-on-obesity-put-public-health-before-food-industry-pressure"}]}]}</script>

  <script>
    (function () {
      var raw = document.getElementById('edition').textContent;
      var data;
      try {
        data = JSON.parse(raw);
      } catch (e) {
        document.getElementById('app').innerHTML =
          '<div class="notice">No edition loaded. Run the build to generate today’s paper.</div>';
        return;
      }

      var state = { active: (data.sections[0] || {}).id, openId: null };

      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function weatherHtml(w) {
        if (!w || !w.icon) return '';
        var week = (w.week || []).map(function (d) {
          return '<div class="day"><div class="d">' + esc(d.day) + '</div>' +
            '<div class="i">' + esc(d.icon) + '</div>' +
            '<div class="hi">' + esc(d.hi) + '°</div>' +
            '<div class="lo">' + esc(d.lo) + '°</div></div>';
        }).join('');
        return '<div class="weather" id="weather">' +
          '<div class="summary">' +
            '<span class="ico">' + esc(w.icon) + '</span>' +
            '<span class="city">Toronto</span>' +
            '<span class="temp">' + esc(w.high) + '° / ' + esc(w.low) + '°</span>' +
            '<span class="muted">' + esc(w.condition) + '</span>' +
            '<span class="muted">Rain ' + esc(w.rain) + '</span>' +
            '<span class="muted">Wind ' + esc(w.wind) + '</span>' +
            '<span class="chev" id="wchev">▼</span>' +
          '</div>' +
          '<div class="week" id="wweek" style="display:none">' + week + '</div>' +
        '</div>';
      }

      function tabsHtml() {
        return '<div class="tabs">' + data.sections.map(function (s) {
          return '<button class="tab' + (s.id === state.active ? ' active' : '') +
            '" data-tab="' + esc(s.id) + '">' + esc(s.label) + '</button>';
        }).join('') + '</div>';
      }

      function cardHtml(st) {
        var open = st.id === state.openId;
        var tag = st.tag ? '<span class="tag">' + esc(st.tag) + '</span>' : '';
        var kicker = st.kicker ? '<div class="kicker">' + tag + esc(st.kicker) + '</div>' : '';
        var sub = st.sub ? '<div class="sub">' + esc(st.sub) + '</div>' : '';
        var expand = '';
        if (open) {
          var img = st.image ? '<img src="' + esc(st.image) + '" alt="" loading="lazy" />' : '';
          var link = st.link
            ? '<a class="readmore" href="' + esc(st.link) + '" target="_blank" rel="noopener">Read full story →</a>'
            : '';
          expand = '<div class="expand">' + img + esc(st.summary) + '<br>' + link + '</div>';
        }
        return '<div class="card' + (st.lead ? ' lead' : '') + (open ? ' open' : '') +
          '" data-card="' + esc(st.id) + '">' +
          '<div class="row"><div style="flex:1">' + kicker +
            '<div class="headline">' + esc(st.headline) + '</div>' + sub +
            '<div class="time">' + esc(st.time) + '</div></div>' +
            '<div class="toggle">' + (open ? '−' : '+') + '</div>' +
          '</div>' + expand +
        '</div>';
      }

      function storiesHtml() {
        var section = data.sections.filter(function (s) { return s.id === state.active; })[0];
        if (!section) return '';
        return '<div class="stories">' + section.stories.map(cardHtml).join('') + '</div>';
      }

      function render() {
        document.getElementById('app').innerHTML =
          '<div class="masthead">' +
            '<div class="date">' + esc(data.date) + '</div>' +
            '<div class="title">THE DAILY</div>' +
            '<div class="tagline">Toronto · World · Business · Sport</div>' +
          '</div>' +
          weatherHtml(data.weather) +
          tabsHtml() +
          storiesHtml() +
          '<div class="footer">THE DAILY · TORONTO · Tap any headline to read</div>';
        bind();
      }

      function bind() {
        var weather = document.getElementById('weather');
        if (weather) {
          weather.addEventListener('click', function () {
            var week = document.getElementById('wweek');
            var chev = document.getElementById('wchev');
            var showing = week.style.display !== 'none';
            week.style.display = showing ? 'none' : 'flex';
            chev.textContent = showing ? '▼' : '▲';
          });
        }
        Array.prototype.forEach.call(document.querySelectorAll('.tab'), function (btn) {
          btn.addEventListener('click', function () {
            state.active = btn.getAttribute('data-tab');
            state.openId = null;
            render();
          });
        });
        Array.prototype.forEach.call(document.querySelectorAll('.card'), function (card) {
          card.addEventListener('click', function (ev) {
            if (ev.target.closest('a')) return; // let the read-more link work
            var id = card.getAttribute('data-card');
            state.openId = state.openId === id ? null : id;
            render();
          });
        });
      }

      render();
    })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>

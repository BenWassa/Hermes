  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #efece6; }
    body {
      font-family: 'Georgia', serif;
      color: #111;
      -webkit-font-smoothing: antialiased;
    }
    #app {
      min-height: 100vh;
      background: #fff;
      max-width: 680px;
      margin: 0 auto;
    }

    /* Masthead */
    .masthead {
      border-bottom: 4px solid #1a2744;
      padding: 18px 20px 14px;
      background: #fff;
    }
    .masthead .date {
      font-size: 11px; color: #999; letter-spacing: 0.1em;
      text-transform: uppercase; margin-bottom: 4px;
    }
    .masthead .title {
      font-size: 38px; font-weight: 700; letter-spacing: -0.01em;

    }
    .masthead .tagline {
      font-family: 'Arial', sans-serif; font-size: 10px; color: #999;
      letter-spacing: 0.18em; text-transform: uppercase;
    }

    /* Weather strip */
    .weather {
      background: #1a2744; color: #fff; cursor: pointer; user-select: none;
    }
    .weather .summary {
      display: flex; align-items: center; gap: 16px;
      padding: 10px 20px; overflow-x: auto; scrollbar-width: none;
    }
    .weather .summary::-webkit-scrollbar { display: none; }
    .weather .ico { font-size: 22px; }
    .weather .city { font-weight: 700; font-size: 15px; }
    .weather .temp { font-size: 15px; }
    .weather .muted { opacity: 0.7; font-size: 13px; white-space: nowrap; }
    .weather .chev { margin-left: auto; opacity: 0.6; font-size: 12px; }
    .weather .week {
      display: flex; border-top: 1px solid rgba(255,255,255,0.12);
      padding: 10px 20px; overflow-x: auto; scrollbar-width: none;
    }
    .weather .week::-webkit-scrollbar { display: none; }
    .weather .day {
      text-align: center; min-width: 52px; padding: 0 8px;
      border-right: 1px solid rgba(255,255,255,0.1);
    }
    .weather .day .d { font-size: 11px; opacity: 0.6; margin-bottom: 4px; }
    .weather .day .i { font-size: 18px; }
    .weather .day .hi { font-size: 13px; font-weight: 700; margin-top: 4px; }
    .weather .day .lo { font-size: 11px; opacity: 0.5; }

    /* Tab nav */
    .tabs {
      display: flex; overflow-x: auto; border-bottom: 2px solid #1a2744;
      background: #fff; scrollbar-width: none; position: sticky; top: 0; z-index: 10;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 12px 18px; border: none; background: none;
      cursor: pointer; font-family: 'Georgia', serif; font-size: 13px;
      font-weight: 400; color: #666; border-bottom: 3px solid transparent;
      margin-bottom: -2px; letter-spacing: 0.04em; text-transform: uppercase;
      transition: color 0.15s;
    }
    .tab.active { font-weight: 700; color: #1a2744; border-bottom-color: #1a2744; }

    /* Stories */
    .stories { padding: 0 20px 40px; }
    .card {
      border-top: 1px solid #ddd; padding: 14px 0; cursor: pointer;
      background: #fff; transition: background 0.15s;
    }
    .card.lead { border-top: 3px solid #1a2744; padding: 20px 0 16px; }
    .card.open { background: #f8f7f4; }
    .card .row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .card .kicker {
      font-family: 'Arial', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; color: #8b1a1a; margin-bottom: 6px; text-transform: uppercase;
    }
    .card .tag {
      background: #8b1a1a; color: #fff; padding: 1px 6px; margin-right: 8px;
      font-size: 9px; border-radius: 2px;
    }
    .card .headline {
      font-size: 17px; font-weight: 700; line-height: 1.25; color: #111; margin-bottom: 6px;
    }
    .card.lead .headline { font-size: 22px; }
    .card .sub {
      font-size: 14px; color: #444; line-height: 1.4; margin-bottom: 4px; font-style: italic;
    }
    .card .time { font-family: 'Arial', sans-serif; font-size: 11px; color: #999; margin-top: 4px; }
    .card .toggle { color: #bbb; font-size: 18px; flex-shrink: 0; margin-top: 2px; }
    .card .expand {
      margin-top: 14px; padding-top: 14px; border-top: 1px solid #e0ddd8;
      font-size: 15px; color: #333; line-height: 1.7;
    }
    .card .expand img {
      display: block; width: 100%; height: auto; border-radius: 3px; margin-bottom: 12px;
    }
    .card .readmore {
      display: inline-block; margin-top: 12px; font-family: 'Arial', sans-serif;
      font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: #1a2744;
      text-decoration: none;
    }
    .card .readmore:hover { text-decoration: underline; }

    /* Footer */
    .footer {

      font-family: 'Arial', sans-serif; font-size: 11px; color: #aaa;
      text-align: center; letter-spacing: 0.06em;

ility-handled-killers-mental-health-symptoms/article_58b0003d-5534-4cee-8c49-b3a61f74d37d.html"}, {"id": "t2", "lead": false, "kicker": "MAYORAL RACE", "headline": "Mayoral challenger Brad Bradford decries rising crime and costs at first campaign rally", "sub": "Bradford states that problems once focused downtown are now affecting outer boroughs.", "summary": "Mayoral challenger Brad Bradford held his first campaign rally in Etobicoke, where he decried rising crime and costs across the city. He told the crowd at a Ukrainian community centre that \"the problems that used to be focused downtown are being shipped out here.\" Bradford's campaign focuses on addressing these issues impacting Toronto residents.", "time": "Yesterday", "tag": null, "sensitivity": false, "image": "https://bloximages.chicago2.vip.townnews.com/thestar.com/content/tncms/assets/v3/editorial/c/cd/ccd818ee-16c5-50ba-a823-218a28cdf29d/6a4da18a29c28.image.jpg?resize=300%2C200", "link": "https://www.thestar.com/news/gta/mayoral-challenger-brad-bradford-decries-rising-crime-and-costs-at-first-campaign-rally-in-etobicoke/article_230bd40d-5dd0-4573-b835-091e5c99b8ba.html"}, {"id": "t3", "lead": false, "kicker": "INTERNATIONAL CRIME", "headline": "Three Canadians named in international crackdown on Indian prison-based crime group", "sub": "One crime named in the indictment is for the June 2023 B.C. murder of Sikh activist Hardeep Singh Nijjar.", "summary": "Three Canadians have been named in an international crackdown targeting an Indian prison-based crime group. The indictment includes charges related to the June 2023 murder of Sikh activist Hardeep Singh Nijjar in British Columbia. This development highlights the global reach of organized crime and international efforts to combat it.", "time": "Yesterday", "tag": null, "sensitivity": true, "image": null, "link": "https://www.thestar.com/news/gta/three-canadians-named-in-international-crackdown-on-thugs-running-indian-prison-based-crime-group/article_03f48d85-b28c-4029-a659-ee2202fd9d6b.html"}, {"id": "t4", "lead": false, "kicker": "LOCAL NEWS", "headline": "Renata Ford dead at 55: A look at the political life of Rob Ford's widow in six moments", "sub": "While Rob Ford lived a boisterous life, his wife Renata often sought privacy in the shadows.", "summary": "Renata Ford, widow of former Toronto mayor Rob Ford, has died at the age of 55. Known for her preference for privacy despite her husband's public life, her political journey is remembered through six key moments. Her passing marks the end of a life intertwined with one of Toronto's most prominent political figures.", "time": "Yesterday", "tag": null, "sensitivity": true, "image": null, "link": "https://www.thestar.com/news/gta/renata-ford-dead-at-55-a-look-at-the-political-life-of-rob-fords-widow-in-6-moments/article_62fe2023-6754-4796-839b-5d5699ec7194.html"}]}, {"id": "world", "label": "World", "stories": [{"id": "w1", "lead": true, "kicker": "UKRAINE WAR", "headline": "Kyiv targets Kremlin ‘shadow’ tankers as Russian strikes continue in capital", "sub": "Two people injured in Kyiv attack, while early strike on southern port of Odesa injured 10.", "summary": "Kyiv has targeted Kremlin 'shadow' tankers as Russian strikes persist in the Ukrainian capital. Two people were injured in the Kyiv attack, while an earlier strike on the southern port of Odesa injured ten. This marks day 1,596 of the conflict, with ongoing hostilities impacting civilian areas and infrastructure.", "time": "2:04 AM", "tag": "WAR", "sensitivity": true, "image": null, "link": "https://www.theguardian.com/world/2026/jul/08/ukraine-war-briefing-kyiv-targets-kremlin-shadow-tankers-as-russian-strikes-continue-in-capital"}, {"id": "w2", "lead": false, "kicker": "MIDDLE EAST", "headline": "Palestinians brace as Israeli settler figures seek to cement West Bank gains", "sub": "Growing number of farm outposts use violence to seize territory, enabled by radical elements in Netanyahu’s government.", "summary": "Palestinians are bracing for increased pressure as Israeli settler figures within the coalition government seek to cement West Bank gains before the upcoming election. A growing number of farm outposts are reportedly using violence to seize territory, a process seemingly enabled by radical elements within Prime Minister Netanyahu's government. This situation exacerbates tensions and raises concerns about human rights.", "time": "4:00 AM", "tag": null, "sensitivity": true, "image": null, "link": "https://www.theguardian.com/world/2026/jul/08/palestinians-brace-as-israeli-settler-figures-in-coalition-seek-to-cement-west-bank-gains-before-election"}, {"id": "w3", "lead": false, "kicker": "EUROPE", "headline": "Wildfires force thousands to evacuate across southern Europe", "sub": "Fires impact France, Spain, Portugal, Greece, and other parts of the region.", "summary": "Wildfires have forced thousands of people to evacuate across France, Spain, Portugal, Greece, and other parts of southern Europe. Authorities are battling the blazes, which have caused significant damage and displacement. The Guardian is seeking accounts from individuals affected by these widespread fires.", "time": "5:47 AM", "tag": null, "sensitivity": true, "image": null, "link": "https://www.theguardian.com/world/2026/jul/08/tell-us-have-you-been-affected-by-the-wildfires-in-southern-europe"}, {"id": "w4", "lead": false, "kicker": "IRAN", "headline": "Mass mournings in Qom, where Khamenei ruled supreme over Iran’s clerics", "sub": "The ceremony for Ayatollah Ali Khamenei was the latest step in a weeklong funeral organized by Iran’s government.", "summary": "Mass mourning ceremonies are being held in Qom, a city where Ayatollah Ali Khamenei held supreme authority over Iran’s clerics. This ceremony, at a site considered sacred by many Shiites, is the latest step in a weeklong funeral organized by the Iranian government. The events mark a significant period of national mourning and transition.", "time": "Yesterday", "tag": null, "sensitivity": true, "image": null, "link": "https://www.nytimes.com/2026/07/07/world/middleeast/iran-khamenei-qom-funeral.html"}]}, {"id": "sports", "label": "Sports", "stories": [{"id": "s1", "lead": true, "kicker": "RUGBY LEAGUE", "headline": "State of Origin 2026 Game 3 live: Qld Maroons v NSW Blues – latest updates", "sub": "Can New South Wales claim the Origin shield in Queensland territory?", "summary": "The State of Origin 2026 Game 3 is underway, with the Queensland Maroons facing the New South Wales Blues. Fans are eagerly watching to see if New South Wales can secure the Origin shield on Queensland territory. Jonathan Howcroft is providing minute-by-minute updates on the decisive match.", "time": "6:29 AM", "tag": "LIVE", "sensitivity": false, "image": "https://media.guim.co.uk/64c4721d9e573f4e5141c41479d97740ef2de032/276_0_2321_1857/500.jpg", "link": "https://www.theguardian.com/sport/live/2026/jul/08/state-of-origin-2026-game-3-decider-nsw-blues-v-queensland-maroons-live"}, {"id": "s2", "lead": false, "kicker": "NBA", "headline": "NBA free agency winners and losers: Sixers cash in while Celtics pay price", "sub": "Philly's blockbuster coup and LeBron James' market dominance highlight the first week of free agency.", "summary": "The first week of NBA free agency has seen clear winners and losers, with the Sixers making a blockbuster coup. The Celtics, however, appear to be paying a price in the market. LeBron James continues to dominate the free agency landscape, influencing major team decisions and player movements.", "time": "5:00 AM", "tag": null, "sensitivity": false, "image": "https://media.guim.co.uk/38307307ca02718a3fedcbf4f5bd478c78bcf266/488_0_3904_3125/500.jpg", "link": "https://www.theguardian.com/sport/2026/jul/08/nba-free-agency-2026-winners-losers-sixers-celtics-lakers-lebron"}, {"id": "s3", "lead": false, "kicker": "CRICKET", "headline": "England thrash India by 125 runs in third men’s T20 cricket international", "sub": "England inflict heaviest T20I defeat on India, winning by 125 runs at Trent Bridge.", "summary": "England inflicted India's heaviest T20I defeat, thrashing them by 125 runs in the third men's T20 cricket international at Trent Bridge. Harry Brook’s England now lead the series 2-0 after India lost regular wickets in pursuit of a modest total. The dominant performance showcased England's strong form in the series.", "time": "Yesterday", "tag": "FINAL", "sensitivity": false, "image": "https://media.guim.co.uk/dfe9eac5ed0a9f6ebfc077007e64f51ad1e18569/598_54_2444_1955/500.jpg", "link": "https://www.theguardian.com/sport/live/2026/jul/07/england-v-india-third-mens-t20-cricket-international-live"}, {"id": "s4", "lead": false, "kicker": "WOMEN'S CRICKET", "headline": "‘Plant pots in the urinals’: Lord’s pioneers reunite 50 years after first women’s game", "sub": "Nine England players and one Australian from 1976 gather on the eve of Friday’s first women’s Test at Lord’s.", "summary": "Nine England players and one Australian from the first women's game at Lord's in 1976 are reuniting to reflect on their pioneering experience. This gathering occurs on the eve of Friday's historic first women's Test match at Lord's. The event celebrates their legacy and the progress of women's cricket over five decades.", "time": "5:24 AM", "tag": null, "sensitivity": false, "image": "https://media.guim.co.uk/8d0585b18e4f4f87d95c1671cbc0e8ea5fe600e3/249_0_3374_2699/500.jpg", "link": "https://www.theguardian.com/sport/2026/jul/08/plant-pots-in-the-urinals-lords-pioneers-reunite-and-reflect-50-years-after-first-womens-game"}]}, {"id": "business", "label": "Business", "stories": [{"id": "b1", "lead": true, "kicker": "TELECOMMUNICATIONS", "headline": "Telstra blames ‘software defect’ for major outage that hit mobiles, trains and triple-zero calls", "sub": "Telco warns of scammers claiming to be from Telstra after network disruption.", "summary": "Telstra has attributed a majo   <script>
    (function () {
      var raw = document.getElementById('edition').textContent;
      var data;
      try {
        data = JSON.parse(raw);
      } catch (e) {
        document.getElementById('app').innerHTML =
          '<div class="notice">No edition loaded. Run the build to generate today’s paper.</div>';
        return;
      }

      var state = { active: (data.sections[0] || {}).id, openId: null };

      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function weatherHtml(w) {
        if (!w || !w.icon) return '';
        var week = (w.week || []).map(function (d) {
          return '<div class="day"><div class="d">' + esc(d.day) + '</div>' +
            '<div class="i">' + esc(d.icon) + '</div>' +
            '<div class="hi">' + esc(d.hi) + '°</div>' +
            '<div class="lo">' + esc(d.lo) + '°</div></div>';
        }).join('');
        return '<div class="weather" id="weather">' +
          '<div class="summary">' +
            '<span class="ico">' + esc(w.icon) + '</span>' +
            '<span class="city">Toronto</span>' +
            '<span class="temp">' + esc(w.high) + '° / ' + esc(w.low) + '°</span>' +
            '<span class="muted">' + esc(w.condition) + '</span>' +
            '<span class="muted">Rain ' + esc(w.rain) + '</span>' +
            '<span class="muted">Wind ' + esc(w.wind) + '</span>' +
            '<span class="chev" id="wchev">▼</span>' +
          '</div>' +
          '<div class="week" id="wweek" style="display:none">' + week + '</div>' +
        '</div>';
      }

      function tabsHtml() {
        return '<div class="tabs">' + data.sections.map(function (s) {
          return '<button class="tab' + (s.id === state.active ? ' active' : '') +
            '" data-tab="' + esc(s.id) + '">' + esc(s.label) + '</button>';
        }).join('') + '</div>';
      }

      function cardHtml(st) {
        var open = st.id === state.openId;
        var tag = st.tag ? '<span class="tag">' + esc(st.tag) + '</span>' : '';
        var kicker = st.kicker ? '<div class="kicker">' + tag + esc(st.kicker) + '</div>' : '';
        var sub = st.sub ? '<div class="sub">' + esc(st.sub) + '</div>' : '';
        var expand = '';
        if (open) {
          var img = st.image ? '<img src="' + esc(st.image) + '" alt="" loading="lazy" />' : '';
          var link = st.link
            ? '<a class="readmore" href="' + esc(st.link) + '" target="_blank" rel="noopener">Read full story →</a>'
            : '';
          expand = '<div class="expand">' + img + esc(st.summary) + '<br>' + link + '</div>';
        }
        return '<div class="card' + (st.lead ? ' lead' : '') + (open ? ' open' : '') +
          '" data-card="' + esc(st.id) + '">' +
          '<div class="row"><div style="flex:1">' + kicker +
            '<div class="headline">' + esc(st.headline) + '</div>' + sub +
            '<div class="time">' + esc(st.time) + '</div></div>' +
            '<div class="toggle">' + (open ? '−' : '+') + '</div>' +
          '</div>' + expand +
        '</div>';
      }

      function storiesHtml() {
        var section = data.sections.filter(function (s) { return s.id === state.active; })[0];
        if (!section) return '';
        return '<div class="stories">' + section.stories.map(cardHtml).join('') + '</div>';
      }

      function render() {
        document.getElementById('app').innerHTML =
          '<div class="masthead">' +
            '<div class="date">' + esc(data.date) + '</div>' +
            '<div class="title">THE DAILY</div>' +
            '<div class="tagline">Toronto · World · Business · Sport</div>' +
          '</div>' +
          weatherHtml(data.weather) +
          tabsHtml() +
          storiesHtml() +
          '<div class="footer">THE DAILY · TORONTO · Tap any headline to read</div>';
        bind();
      }

      function bind() {
        var weather = document.getElementById('weather');
        if (weather) {
          weather.addEventListener('click', function () {
            var week = document.getElementById('wweek');
            var chev = document.getElementById('wchev');
            var showing = week.style.display !== 'none';
            week.style.display = showing ? 'none' : 'flex';
            chev.textContent = showing ? '▼' : '▲';
          });
        }
        Array.prototype.forEach.call(document.querySelectorAll('.tab'), function (btn) {
          btn.addEventListener('click', function () {
            state.active = btn.getAttribute('data-tab');
            state.openId = null;
            render();
          });
        });
        Array.prototype.forEach.call(document.querySelectorAll('.card'), function (card) {
          card.addEventListener('click', function (ev) {
            if (ev.target.closest('a')) return; // let the read-more link work
            var id = card.getAttribute('data-card');
            state.openId = state.openId === id ? null : id;
            render();
          });
        });
      }

      render();
    })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    #app {

      background: #fff;
      max-width: 680px;

    /* Masthead */
    .masthead {
      border-bottom: 4px solid #1a2744;
      padding: 18px 20px 14px;
      background: #fff;
    }
    .masthead .date {
      font-size: 11px; color: #999; letter-spacing: 0.1em;

      letter-spacing: 0.18em; text-transform: uppercase;
    }

    /* Weather strip */
    .weather {
      background: #1a2744; color: #fff; cursor: pointer; user-select: none;
    }
    .weather .summary {
      display: flex; align-items: center; gap: 16px;
      padding: 10px 20px; overflow-x: auto; scrollbar-width: none;
    }
    .weather .summary::-webkit-scrollbar { display: none; }
    .weather .ico { font-size: 22px; }
    .weather .city { font-weight: 700; font-size: 15px; }
    .weather .temp { font-size: 15px; }
    .weather .muted { opacity: 0.7; font-size: 13px; white-space: nowrap; }
    .weather .chev { margin-left: auto; opacity: 0.6; font-size: 12px; }
    .weather .week {
      display: flex; border-top: 1px solid rgba(255,255,255,0.12);
      padding: 10px 20px; overflow-x: auto; scrollbar-width: none;
    }
    .weather .week::-webkit-scrollbar { display: none; }
    .weather .day {
      text-align: center; min-width: 52px; padding: 0 8px;
      border-right: 1px solid rgba(255,255,255,0.1);
    }
    .weather .day .d { font-size: 11px; opacity: 0.6; margin-bottom: 4px; }
    .weather .day .i { font-size: 18px; }
    .weather .day .hi { font-size: 13px; font-weight: 700; margin-top: 4px; }
    .weather .day .lo { font-size: 11px; opacity: 0.5; }

    /* Tab nav */
    .tabs {
      display: flex; overflow-x: auto; border-bottom: 2px solid #1a2744;
      background: #fff; scrollbar-width: none; position: sticky; top: 0; z-index: 10;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 12px 18px; border: none; background: none;

      font-weight: 400; color: #666; border-bottom: 3px solid transparent;
      margin-bottom: -2px; letter-spacing: 0.04em; text-transform: uppercase;
      transition: color 0.15s;
    }
    .tab.active { font-weight: 700; color: #1a2744; border-bottom-color: #1a2744; }

    /* Stories */
    .stories { padding: 0 20px 40px; }
    .card {
      border-top: 1px solid #ddd; padding: 14px 0; cursor: pointer;
      background: #fff; transition: background 0.15s;

    .card .time { font-family: 'Arial', sans-serif; font-size: 11px; color: #999; margin-top: 4px; }
    .card .toggle { color: #bbb; font-size: 18px; flex-shrink: 0; margin-top: 2px; }
    .card .expand {
      margin-top: 14px; padding-top: 14px; border-top: 1px solid #e0ddd8;

    .card .readmore {

y just one shot. Dean, who confessed to feeling immense stress during the final holes, had his fiancée caddying for him.", "time": "Yesterday", "tag": "FINAL", "sensitivity": false, "image": "https://media.guim.co.uk/f8105485fddfe5a517f237fd9f987c0cb4b2dc39/455_0_3775_3020/500.jpg", "link": "https://www.theguardian.com/sport/2026/jul/13/shootout-final-spot-open-royal-birkdale-ex-morrisons-driver-joe-dean"}, {"id": "s4", "lead": false, "kicker": "TENNIS", "headline": "Wimbledon awards 2026: best player, epic matches, biggest drama and more", "sub": "Novak Djokovic’s five-set quarter-final thriller, Linda Noskova’s courage and Jannik Sinner’s class were among the highlights at SW19", "summary": "Wimbledon 2026 saw numerous highlights, including Novak Djokovic's thrilling five-set quarter-final match and the courageous performance of Linda Noskova. Jannik Sinner's display of class also stood out among the tournament's most memorable moments and biggest dramas.", "time": "Yesterday", "tag": null, "sensitivity": false, "image": "https://media.guim.co.uk/a65c62687df95704df7f3fb8d994eef7629f4092/0_0_4724_3780/500.jpg", "link": "https://www.theguardian.com/sport/2026/jul/13/wimbledon-2026-awards-best-player-best-matches-biggest-drama"}]}, {"id": "business", "label": "Business", "stories": [{"id": "b1", "lead": true, "kicker": "LABOR", "headline": "U.S. Workers Are More Productive Than Ever. And That’s Without A.I.", "sub": "Companies have been getting more out of employees for several years. Tight labor markets, digitization and remote work are among the reasons.", "summary": "U.S. workers are demonstrating unprecedented levels of productivity, a trend that predates the widespread adoption of AI. This surge is attributed to factors such as tight labor markets, increased digitization, and the prevalence of remote work arrangements, allowing companies to extract more output from their employees.", "time": "6:00 AM", "tag": null, "sensitivity": false, "image": "https://static0 red in Politics", "sub": "Navy acquisition reforms upended a $2.1 billion contract competition. When it was over, several companies with ties to the Trump administration had made the cut.", "summary": "A promising $2.1 billion Navy drone boat program has become entangled in political controversy due to acquisition reforms. The contract competition was upended, and ultimately, several companies with connections to the Trump administration were selected, raising questions about the fairness of the process.", "time": "6:00 AM", "tag": null, "sensitivity": false, "image": "https://static01.nyt.com/images/2026/06/24/us/dc-navy-bidding/dc-navy-bidding-superJumbo.jpg", "link": "https://www.nytimes.com/2026/07/14/us/politics/navy-drone-boat-acquisitions.html"}]}, {"id": "opinion", "label": "Opinion", "stories": [{"id": "o1", "lead": true, "kicker": "EDITORIAL", "headline": "The Guardian view on Shabir Ahmed: changing the law to deport one man will not win back the public’s trust | Editorial", "sub": "Editorial: Grooming gang victims have been treated appallingly and are rightly angry. But the loss of confidence in the criminal justice system goes wider", "summary": "The Guardian argues that while grooming gang victims deserve justice and their anger is justified, changing the law solely to deport Shabir Ahmed will not restore public trust in the criminal justice system. The editorial contends that the crisis of confidence in the system is more widespread and requires broader reforms.", "time": "Yesterday", "tag": "EDITORIAL", "sensitivity": true, "image": null, "link": "https://www.theguardian.com/commentisfree/2026/jul/13/the-guardian-view-on-shabir-ahmed-changing-the-law-to-deport-one-man-will-not-win-back-the-publics-trust"}, {"id": "o2", "lead": false, "kicker": "DISABILITY RIGHTS", "headline": "Burnham has a chance to overhaul Pip. Here's what a truly progressive system could look like | Frances Ryan", "sub": "Last week’s Timms report shows how disability is still vilified. But some pragmatic fixes would help both claimants and the economy, says Guardian columnist Frances Ryan", "summary": "Frances Ryan argues that Andy Burnham has an opportunity to reform the Personal Independence Payment (PIP) system, which the recent Timms report highlighted as still vilifying disability. Ryan suggests that pragmatic changes could benefit both claimants and the broader economy.", "time": "Today", "tag": "OPINION", "sensitivity": false, "image": "https://media.guim.co.uk/0e944ae017feb2f23039c98fea1267929a50f513/489_0_1920_1536/500.jpg", "link": "https://www.theguardian.com/commentisfree/2026/jul/14/andy-burnham-overhaul-pip-progressive-disability-timms-report"}, {"id": "o3", "lead": false, "kicker": "ANTISEMITISM", "headline": "I welcome this £250m to protect Jewish communities. But what good is it if the hatred persists? | David Davidi-Brown", "sub": "Success against antisemitism in the UK will be achieved when schools and synagogues don’t need police protection, says David Davidi-Brown, chief executive of the New Israel Fund", "summary": "David Davidi-Brown welcomes the £250 million allocated for protecting Jewish communities but questions its effectiveness if antisemitism continues to persist. He argues that true success against antisemitism in the UK will only be achieved when Jewish schools and synagogues no longer require police protection.", "time": "Yesterday", "tag": "OPINION", "sensitivity": false, "image": "https://media.guim.co.uk/bc3489316d6df66246b5512a2ddc11f8b8a297f1/285_0_2689_2151/500.jpg", "link": "https://www.theguardian.com/commentisfree/2026/jul/13/jewish-communities-antisemitism-uk-schools-synagogues-police-protection"}, {"id": "o4", "lead": false, "kicker": "DEATH & GRIEF", "headline": "At a dying man’s bedside, I see something much rarer than grief: the courage to include the young | Ranjana Srivastava", "sub": "If we spare youth the reality of death, we postpone to middle age the struggle to reconcile with it", "summary": "Ranjana Srivastava reflects on witnessing a dying man's bedside, observing a rare courage in including young people in the process, rather than shielding them. She posits that by protecting youth from the reality of death, society merely postpones their struggle to reconcile with it until middle age.", "time": "Yesterday", "tag": "OPINION", "sensitivity": true, "image": null, "link": "https://www.theguardian.com/commentisfree/2026/jul/14/death-dying-grief-courage-to-include-the-young"}]}]}</script>

            '<span class="city">Toronto</span>' +
            '<span class="temp">' + esc(w.high) + '° / ' + esc(w.low) + '°</span>' +
            '<span class="muted">' + esc(w.condition) + '</span>' +
            '<span class="muted">Rain ' + esc(w.rain) + '</span>' +
            '<span class="muted">Wind ' + esc(w.wind) + '</span>' +
            '<span class="chev" id="wchev">▼</span>' +
          '</div>' +
          '<div class="week" id="wweek" style="display:none">' + week + '</div>' +
        '</div>';
      }

      function tabsHtml() {
        return '<div class="tabs">' + data.sections.map(function (s) {
          return '<button class="tab' + (s.id === state.active ? ' active' : '') +
            '" data-tab="' + esc(s.id) + '">' + esc(s.label) + '</button>';
        }).join('') + '</div>';
      }

      function cardHtml(st) {
        var open = st.id === state.openId;
        var tag = st.tag ? '<span class="tag">' + esc(st.tag) + '</span>' : '';
        var kicker = st.kicker ? '<div class="kicker">' + tag + esc(st.kicker) + '</div>' : '';
        var sub = st.sub ? '<div class="sub">' + esc(st.sub) + '</div>' : '';
        var expand = '';
        if (open) {
          var img = st.image ? '<img src="' + esc(st.image) + '" alt="" loading="lazy" />' : '';
          var link = st.link
            ? '<a class="readmore" href="' + esc(st.link) + '" target="_blank" rel="noopener">Read full story →</a>'
            : '';
          expand = '<div class="expand">' + img + esc(st.summary) + '<br>' + link + '</div>';
        }
        return '<div class="card' + (st.lead ? ' lead' : '') + (open ? ' open' : '') +
          '" data-card="' + esc(st.id) + '">' +
          '<div class="row"><div style="flex:1">' + kicker +
            '<div class="headline">' + esc(st.headline) + '</div>' + sub +
            '<div class="time">' + esc(st.time) + '</div></div>' +
            '<div class="toggle">' + (open ? '−' : '+') + '</div>' +
          '</div>' + expand +
        '</div>';
      }

      function storiesHtml() {
        var section = data.sections.filter(function (s) { return s.id === state.active; })[0];
        if (!section) return '';
        return '<div class="stories">' + section.stories.map(cardHtml).join('') + '</div>';
      }

      function render() {
        document.getElementById('app').innerHTML =
          '<div class="masthead">' +
            '<div class="date">' + esc(data.date) + '</div>' +
            '<div class="title">THE DAILY</div>' +
            '<div class="tagline">Toronto · World · Business · Sport</div>' +
          '</div>' +
          weatherHtml(data.weather) +
          tabsHtml() +
          storiesHtml() +
          '<div class="footer">THE DAILY · TORONTO · Tap any headline to read</div>';
        bind();
      }

      function bind() {
        var weather = document.getElementById('weather');
        if (weather) {
          weather.addEventListener('click', function () {
            var week = document.getElementById('wweek');
            var chev = document.getElementById('wchev');
            var showing = week.style.display !== 'none';
            week.style.display = showing ? 'none' : 'flex';
            chev.textContent = showing ? '▼' : '▲';
          });
        }
        Array.prototype.forEach.call(document.querySelectorAll('.tab'), function (btn) {
          btn.addEventListener('click', function () {
            state.active = btn.getAttribute('data-tab');
            state.openId = null;
            render();
          });
        });
        Array.prototype.forEach.call(document.querySelectorAll('.card'), function (card) {
          card.addEventListener('click', function (ev) {
            if (ev.target.closest('a')) return; // let the read-more link work
            var id = card.getAttribute('data-card');
            state.openId = state.openId === id ? null : id;
            render();
          });
        });
      }

      render();
    })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>

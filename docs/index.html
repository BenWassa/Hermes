  <title>The Daily</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #efece6; }
    body {
      font-family: 'Georgia', serif;
      color: #111;
      -webkit-font-smoothing: antialiased;
    }
    #app {
      min-height: 100vh;
      background: #fff;
      max-width: 680px;
      margin: 0 auto;
    }

    /* Masthead */
    .masthead {
      border-bottom: 4px solid #1a2744;
      padding: 18px 20px 14px;
      background: #fff;
    }
    .masthead .date {
      font-size: 11px; color: #999; letter-spacing: 0.1em;
      text-transform: uppercase; margin-bottom: 4px;
    }
    .masthead .title {
      font-size: 38px; font-weight: 700; letter-spacing: -0.01em;

    }
    .masthead .tagline {
      font-family: 'Arial', sans-serif; font-size: 10px; color: #999;
      letter-spacing: 0.18em; text-transform: uppercase;
    }

    /* Weather strip */
    .weather {
      background: #1a2744; color: #fff; cursor: pointer; user-select: none;
    }
    .weather .summary {
      display: flex; align-items: center; gap: 16px;
      padding: 10px 20px; overflow-x: auto; scrollbar-width: none;
    }
    .weather .summary::-webkit-scrollbar { display: none; }
    .weather .ico { font-size: 22px; }
    .weather .city { font-weight: 700; font-size: 15px; }
    .weather .temp { font-size: 15px; }
    .weather .muted { opacity: 0.7; font-size: 13px; white-space: nowrap; }
    .weather .chev { margin-left: auto; opacity: 0.6; font-size: 12px; }
    .weather .week {
      display: flex; border-top: 1px solid rgba(255,255,255,0.12);
      padding: 10px 20px; overflow-x: auto; scrollbar-width: none;
    }
    .weather .week::-webkit-scrollbar { display: none; }
    .weather .day {
      text-align: center; min-width: 52px; padding: 0 8px;
      border-right: 1px solid rgba(255,255,255,0.1);
    }
    .weather .day .d { font-size: 11px; opacity: 0.6; margin-bottom: 4px; }
    .weather .day .i { font-size: 18px; }
    .weather .day .hi { font-size: 13px; font-weight: 700; margin-top: 4px; }
    .weather .day .lo { font-size: 11px; opacity: 0.5; }

    /* Tab nav */
    .tabs {
      display: flex; overflow-x: auto; border-bottom: 2px solid #1a2744;
      background: #fff; scrollbar-width: none; position: sticky; top: 0; z-index: 10;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 12px 18px; border: none; background: none;
      cursor: pointer; font-family: 'Georgia', serif; font-size: 13px;
      font-weight: 400; color: #666; border-bottom: 3px solid transparent;
      margin-bottom: -2px; letter-spacing: 0.04em; text-transform: uppercase;
      transition: color 0.15s;
    }
    .tab.active { font-weight: 700; color: #1a2744; border-bottom-color: #1a2744; }

    /* Stories */
    .stories { padding: 0 20px 40px; }
    .card {
      border-top: 1px solid #ddd; padding: 14px 0; cursor: pointer;
      background: #fff; transition: background 0.15s;
    }
    .card.lead { border-top: 3px solid #1a2744; padding: 20px 0 16px; }
    .card.open { background: #f8f7f4; }
    .card .row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .card .kicker {
      font-family: 'Arial', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; color: #8b1a1a; margin-bottom: 6px; text-transform: uppercase;
    }
    .card .tag {

      font-size: 9px; border-radius: 2px;
    }
    .card .headline {

    }
    .card.lead .headline { font-size: 22px; }
    .card .sub {
      font-size: 14px; color: #444; line-height: 1.4; margin-bottom: 4px; font-style: italic;
    }
    .card .time { font-family: 'Arial', sans-serif; font-size: 11px; color: #999; margin-top: 4px; }
    .card .toggle { color: #bbb; font-size: 18px; flex-shrink: 0; margin-top: 2px; }
    .card .expand {
      margin-top: 14px; padding-top: 14px; border-top: 1px solid #e0ddd8;
      font-size: 15px; color: #333; line-height: 1.7;
    }
    .card .expand img {
      display: block; width: 100%; height: auto; border-radius: 3px; margin-bottom: 12px;
    }
    .card .readmore {
      display: inline-block; margin-top: 12px; font-family: 'Arial', sans-serif;
      font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: #1a2744;
      text-decoration: none;
    }
    .card .readmore:hover { text-decoration: underline; }

    /* Footer */
    .footer {
      border-top: 2px solid #1a2744; padding: 16px 20px;
      font-family: 'Arial', sans-serif; font-size: 11px; color: #aaa;
      text-align: center; letter-spacing: 0.06em;

  </style>

L", "headline": "Former Liberal MP Han Dong running for Toronto city council", "sub": "Dong will challenge incumbent councillor Jamaal Myers in Scarborough North.", "summary": "Former Liberal MP Han Dong has announced his candidacy for Toronto city council, aiming to represent Scarborough North. He will face incumbent councillor Jamaal Myers, who has already registered for re-election. This sets up a notable contest in the upcoming municipal elections.", "time": "Yesterday", "tag": null, "sensitivity": false, "image": "https://bloximages.chicago2.vip.townnews.com/thestar.com/content/tncms/assets/v3/editorial/8/42/84207a36-2a38-5fbd-beeb-7da0de8d64b6/679a81f65d625.image.jpg?resize=300%2C197", "link": "https://www.thestar.com/news/gta/former-liberal-mp-han-dong-running-for-toronto-city-council/article_5d782125-b1bc-4115-b380-288a13fd77c2.html"}, {"id": "t3", "lead": false, "kicker": "YORK POLICE", "headline": "York police officer arrested, facing charges of unauthorized computer use and breach of trust", "sub": "Const. Krivijan Ketheeswaran's charges are unrelated to Project South police corruption probe.", "summary": "Constable Krivijan Ketheeswaran of York police was arrested Wednesday and faces charges of unauthorized computer use and breach of trust. Investigators have clarified that these charges are not connected to the ongoing Project South police corruption probe. The arrest highlights internal accountability within the force.", "time": "Yesterday", "tag": null, "sensitivity": false, "image": "https://bloximages.chicago2.vip.townnews.com/thestar.com/content/tncms/assets/v3/editorial/4/7d/47d12240-5924-54a1-8b38-fc4be62ad1c2/6a29e8ee77304.image.jpg?resize=300%2C200", "link": "https://www.thestar.com/news/gta/york-police-officer-arrested-facing-charges-of-unauthorized-computer-use-and-breach-of-trust/article_446611ef-7dbd-4308-8116-58d7c6a0a3ad.html"}, {"id": "t4", "lead": false, "kicker": "REAL ESTATE", "headline": "Landlord of troubled 500 Dawes fined over $300,000 for fire safety violations", "sub": "Fine comes weeks after Carolyn Krebs was sentenced to 15 days in custody for violations at another property.", "summary": "The landlord of the problematic 500 Dawes property has been fined more than $300,000 for fire safety violations. This significant penalty follows Carolyn Krebs's recent 15-day jail sentence for similar infractions at a different building. The repeated violations underscore ongoing concerns about tenant safety and landlord accountability.", "time": "Yesterday", "tag": null, "sensitivity": false, "image": "https://bloximages.chicago2.vip.townnews.com/thestar.com/content/tncms/assets/v3/editorial/2/48/2481bb14-3d75-5e24-bece-6a782296aca5/6a32a556717af.image.jpg?resize=300%2C200", "link": "https://www.thestar.com/real-estate/landlord-of-troubled-500-dawes-fined-more-than-300000-for-fire-safety-violations/article_1bd80073-745b-4859-b72a-233135d3dc6a.html"}]}, {"id": "world", "label": "World", "stories": [{"id": "w1", "lead": true, "kicker": "UKRAINE WAR", "headline": "Ukraine targets Crimea with fuel truck attacks, causing gasoline shortages", "sub": "Scores of targeted attacks against supply routes are part of what Kyiv calls a 'logistics lockdown'.", "summary": "Ukraine has launched numerous targeted attacks against fuel trucks and supply routes in Crimea, leading to widespread gasoline shortages. Kyiv describes these actions as a 'logistics lockdown' aimed at disrupting Russian military operations. The strikes highlight Ukraine's strategy to cripple enemy supply lines and infrastructure.", "time": "Yesterday", "tag": "WAR", "sensitivity": true, "image": null, "link": "https://www.nytimes.com/2026/06/17/world/europe/russia-ukraine-crimea-fuel-shortages.html"}, {"id": "w2", "lead": false, "kicker": "TAIWAN", "headline": "Inspired by Ukraine, and worried by China: Taiwan teaches its citizens how to fly drones", "sub": "Ordinary Taiwanese, young and old, are joining courses to learn how to fly drones amid looming China military threat.", "summary": "Taiwanese citizens, both young and old, are enrolling in drone pilot courses, inspired by Ukraine's defense tactics and growing concerns over a potential Chinese military threat. This initiative aims to bolster civilian readiness and enhance national defense capabilities. The widespread participation underscores a proactive approach to perceived geopolitical dangers.", "time": "6:14 AM", "tag": null, "sensitivity": false, "image": "https://media.guim.co.uk/9e6a9e8fd2e95dd3b8306572a8d8d7d9200c50c1/576_185_2487_1990/500.jpg", "link": "https://www.theguardian.com/world/2026/jun/18/taiwan-citizens-learn-fly-pilot-drones-courses-china"}, {"id": "w3", "lead": false, "kicker": "TITAN SUB", "headline": "Titan sub: design flaws and company groupthink central to catastrophe, report finds", "sub": "Canadian officials find structural defects in hull material and say firm failed to fully test 'novel' design.", "summary": "A report by Canadian officials has concluded that design flaws and company groupthink were central to the Titan submersible catastrophe. Investigators found structural defects in the hull material and determined that the firm failed to adequately test its 'novel' design. This report sheds light on the critical failures that led to the tragic implosion.", "time": "Yesterday", "tag": "FINAL", "sensitivity": true, "image": null, "link": "https://www.theguardian.com/world/2026/jun/17/titan-sub-design-flaws-company-groupthink-report"}, {"id": "w4", "lead": false, "kicker": "BAHRAIN", "headline": "Bahrain revokes citizenship, attempts to expel 69 people to Iran", "sub": "Amid war with Iran, Bahrain accuses citizens of disloyalty, rendering them stateless.", "summary": "Bahrain has stripped 69 individuals, including children, of their citizenship, accusing them of disloyalty amid the ongoing war with Iran. This action has rendered them stateless, with attempts made to expel them to Iran. The move raises significant human rights concerns and exacerbates regional tensions.", "time": "Yesterday", "tag": null, "sensitivity": true, "image": null, "link": "https://www.nytimes.com/2026/06/17/world/middleeast/bahrain-iran-citizenship-expulsions.html"}]}, {"id": "sports", "label": "Sports", "stories": [{"id": "s1", "lead": true, "kicker": "NBA", "headline": "Knicks to follow up Trump boos at Madison Square Garden with White House visit", "sub": "New York Knicks owner James Dolan says his team will become the first NBA champions to visit Donald Trump at the White House.", "summary": "New York Knicks owner James Dolan announced that the team, fresh off their NBA championship, will visit Donald Trump at the White House. This visit will make them the first NBA champions to do so, following a mixed reception for Trump at Madison Square Garden. The decision has sparked discussion given the team's recent interactions with the president.", "time": "Yesterday", "tag": null, "sensitivity": false, "image": "https://media.guim.co.uk/152c1792dfbc6db4a835ea4c18d30c64c7f8f3b4/379_0_3777_3023/500.jpg", "link": "https://www.theguardian.com/sport/2026/jun/17/new-york-knicks-white-house-visit-nba-title"}, {"id": "s2", "lead": false, "kicker": "OLYMPICS", "headline": "Three-time Olympian Jenny Simpson in hospital after collapsing at track event", "sub": "The 2016 bronze medalist reportedly did not have a pulse for a period of time, but it was restored by CPR and an AED.", "summary": "Three-time Olympian Jenny Simpson was hospitalized after collapsing at a track event, reportedly losing her pulse for a period. Her pulse was restored through CPR and an AED. The 2016 bronze medalist in the 1500m is now receiving medical care, with her condition being closely monitored.", "time": "Yesterday", "tag": null, "sensitivity": true, "image": null, "link": "https://www.theguardian.com/sport/2026/jun/17/jenny-simpson-collapse"}, {"id": "s3", "lead": false, "kicker": "ROYAL ASCOT", "headline": "Ombudsman dishes out decisive beati   <script>
    (function () {
      var raw = document.getElementById('edition').textContent;
      var data;
      try {
        data = JSON.parse(raw);
      } catch (e) {
        document.getElementById('app').innerHTML =
          '<div class="notice">No edition loaded. Run the build to generate today’s paper.</div>';
        return;
      }

      var state = { active: (data.sections[0] || {}).id, openId: null };

      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function weatherHtml(w) {
        if (!w || !w.icon) return '';
        var week = (w.week || []).map(function (d) {
          return '<div class="day"><div class="d">' + esc(d.day) + '</div>' +
            '<div class="i">' + esc(d.icon) + '</div>' +
            '<div class="hi">' + esc(d.hi) + '°</div>' +
            '<div class="lo">' + esc(d.lo) + '°</div></div>';
        }).join('');
        return '<div class="weather" id="weather">' +
          '<div class="summary">' +
            '<span class="ico">' + esc(w.icon) + '</span>' +
            '<span class="city">Toronto</span>' +
            '<span class="temp">' + esc(w.high) + '° / ' + esc(w.low) + '°</span>' +
            '<span class="muted">' + esc(w.condition) + '</span>' +
            '<span class="muted">Rain ' + esc(w.rain) + '</span>' +
            '<span class="muted">Wind ' + esc(w.wind) + '</span>' +
            '<span class="chev" id="wchev">▼</span>' +
          '</div>' +
          '<div class="week" id="wweek" style="display:none">' + week + '</div>' +
        '</div>';
      }

      function tabsHtml() {
        return '<div class="tabs">' + data.sections.map(function (s) {
          return '<button class="tab' + (s.id === state.active ? ' active' : '') +
            '" data-tab="' + esc(s.id) + '">' + esc(s.label) + '</button>';
        }).join('') + '</div>';
      }

      function cardHtml(st) {
        var open = st.id === state.openId;
        var tag = st.tag ? '<span class="tag">' + esc(st.tag) + '</span>' : '';
        var kicker = st.kicker ? '<div class="kicker">' + tag + esc(st.kicker) + '</div>' : '';
        var sub = st.sub ? '<div class="sub">' + esc(st.sub) + '</div>' : '';
        var expand = '';
        if (open) {
          var img = st.image ? '<img src="' + esc(st.image) + '" alt="" loading="lazy" />' : '';
          var link = st.link
            ? '<a class="readmore" href="' + esc(st.link) + '" target="_blank" rel="noopener">Read full story →</a>'
            : '';
          expand = '<div class="expand">' + img + esc(st.summary) + '<br>' + link + '</div>';
        }
        return '<div class="card' + (st.lead ? ' lead' : '') + (open ? ' open' : '') +
          '" data-card="' + esc(st.id) + '">' +
          '<div class="row"><div style="flex:1">' + kicker +
            '<div class="headline">' + esc(st.headline) + '</div>' + sub +
            '<div class="time">' + esc(st.time) + '</div></div>' +
            '<div class="toggle">' + (open ? '−' : '+') + '</div>' +
          '</div>' + expand +
        '</div>';
      }

      function storiesHtml() {
        var section = data.sections.filter(function (s) { return s.id === state.active; })[0];
        if (!section) return '';
        return '<div class="stories">' + section.stories.map(cardHtml).join('') + '</div>';
      }

      function render() {
        document.getElementById('app').innerHTML =
          '<div class="masthead">' +
            '<div class="date">' + esc(data.date) + '</div>' +
            '<div class="title">THE DAILY</div>' +
            '<div class="tagline">Toronto · World · Business · Sport</div>' +
          '</div>' +
          weatherHtml(data.weather) +
          tabsHtml() +
          storiesHtml() +
          '<div class="footer">THE DAILY · TORONTO · Tap any headline to read</div>';
        bind();
      }

      function bind() {
        var weather = document.getElementById('weather');
        if (weather) {
          weather.addEventListener('click', function () {
            var week = document.getElementById('wweek');
            var chev = document.getElementById('wchev');
            var showing = week.style.display !== 'none';
            week.style.display = showing ? 'none' : 'flex';
            chev.textContent = showing ? '▼' : '▲';
          });
        }
        Array.prototype.forEach.call(document.querySelectorAll('.tab'), function (btn) {
          btn.addEventListener('click', function () {
            state.active = btn.getAttribute('data-tab');
            state.openId = null;
            render();
          });
        });
        Array.prototype.forEach.call(document.querySelectorAll('.card'), function (card) {
          card.addEventListener('click', function (ev) {
            if (ev.target.closest('a')) return; // let the read-more link work
            var id = card.getAttribute('data-card');
            state.openId = state.openId === id ? null : id;
            render();
          });
        });
      }

      render();
    })();
  </script>
</body>
</html>

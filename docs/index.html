  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #efece6; }
    body {
      font-family: 'Georgia', serif;
      color: #111;
      -webkit-font-smoothing: antialiased;
    }
    #app {
      min-height: 100vh;
      background: #fff;
      max-width: 680px;
      margin: 0 auto;
    }

    /* Masthead */
    .masthead {
      border-bottom: 4px solid #1a2744;
      padding: 18px 20px 14px;
      background: #fff;
    }
    .masthead .date {
      font-size: 11px; color: #999; letter-spacing: 0.1em;
      text-transform: uppercase; margin-bottom: 4px;
    }
    .masthead .title {
      font-size: 38px; font-weight: 700; letter-spacing: -0.01em;
      color: #1a2744; line-height: 1; margin-bottom: 2px;
    }
    .masthead .tagline {
      font-family: 'Arial', sans-serif; font-size: 10px; color: #999;
      letter-spacing: 0.18em; text-transform: uppercase;
    }

    /* Weather strip */
    .weather {
      background: #1a2744; color: #fff; cursor: pointer; user-select: none;
    }
    .weather .summary {
      display: flex; align-items: center; gap: 16px;
      padding: 10px 20px; overflow-x: auto; scrollbar-width: none;
    }
    .weather .summary::-webkit-scrollbar { display: none; }
    .weather .ico { font-size: 22px; }
    .weather .city { font-weight: 700; font-size: 15px; }
    .weather .temp { font-size: 15px; }
    .weather .muted { opacity: 0.7; font-size: 13px; white-space: nowrap; }
    .weather .chev { margin-left: auto; opacity: 0.6; font-size: 12px; }
    .weather .week {
      display: flex; border-top: 1px solid rgba(255,255,255,0.12);
      padding: 10px 20px; overflow-x: auto; scrollbar-width: none;
    }
    .weather .week::-webkit-scrollbar { display: none; }
    .weather .day {
      text-align: center; min-width: 52px; padding: 0 8px;
      border-right: 1px solid rgba(255,255,255,0.1);
    }
    .weather .day .d { font-size: 11px; opacity: 0.6; margin-bottom: 4px; }
    .weather .day .i { font-size: 18px; }
    .weather .day .hi { font-size: 13px; font-weight: 700; margin-top: 4px; }
    .weather .day .lo { font-size: 11px; opacity: 0.5; }

    /* Tab nav */
    .tabs {
      display: flex; overflow-x: auto; border-bottom: 2px solid #1a2744;
      background: #fff; scrollbar-width: none; position: sticky; top: 0; z-index: 10;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 12px 18px; border: none; background: none;
      cursor: pointer; font-family: 'Georgia', serif; font-size: 13px;
      font-weight: 400; color: #666; border-bottom: 3px solid transparent;
      margin-bottom: -2px; letter-spacing: 0.04em; text-transform: uppercase;
      transition: color 0.15s;
    }
    .tab.active { font-weight: 700; color: #1a2744; border-bottom-color: #1a2744; }

    /* Stories */
    .stories { padding: 0 20px 40px; }
    .card {
      border-top: 1px solid #ddd; padding: 14px 0; cursor: pointer;
      background: #fff; transition: background 0.15s;
    }
    .card.lead { border-top: 3px solid #1a2744; padding: 20px 0 16px; }
    .card.open { background: #f8f7f4; }

    .card .kicker {
      font-family: 'Arial', sans-serif; font-size: 10px; font-weight: 700;

    .card .tag {

    .card .headline {

    }
    .card.lead .headline { font-size: 22px; }
    .card .sub {
      font-size: 14px; color: #444; line-height: 1.4; margin-bottom: 4px; font-style: italic;
    }
    .card .time { font-family: 'Arial', sans-serif; font-size: 11px; color: #999; margin-top: 4px; }
    .card .toggle { color: #bbb; font-size: 18px; flex-shrink: 0; margin-top: 2px; }
    .card .expand {
      margin-top: 14px; padding-top: 14px; border-top: 1px solid #e0ddd8;
      font-size: 15px; color: #333; line-height: 1.7;

    .card .readmore {
      display: inline-block; margin-top: 12px; font-family: 'Arial', sans-serif;
      font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: #1a2744;
      text-decoration: none;

    .card .readmore:hover { text-decoration: underline; }

      font-family: 'Arial', sans-serif; font-size: 11px; color: #aaa;

th advises the public to stay out of the water at two Toronto public beaches based on the latest water quality report from June 21 at 7 a.m. Elevated bacteria levels have been detected, posing a potential health risk. Swimmers should check local advisories before entering the water.", "time": "4:55 AM", "tag": null, "sensitivity": false, "image": "https://bloximages.chicago2.vip.townnews.com/thestar.com/content/tncms/assets/v3/editorial/f/6b/f6b2487a-9b87-5397-9222-a0fbd887312b/64b959107fcd5.image.jpg?resize=300%2C225", "link": "https://www.thestar.com/news/gta/beach-water-quality/stay-out-of-the-water-at-two-toronto-public-beaches/article_8ea2138e-46e4-5f10-b158-82e4012a167d.html"}]}, {"id": "world", "label": "World", "stories": [{"id": "w1", "lead": true, "kicker": "MIDDLE EAST", "headline": "Four months after the horrific Iran school bombing, fears grow that Trump and Hegseth will bury the truth", "sub": "A secretive investigation into the attack that killed at least 175 has concluded, reports suggest. Will its findings ever see the light of day?", "summary": "Four months after a horrific school bombing in Iran killed at least 175 people, concerns are mounting that the truth may be suppressed by the Trump and Hegseth administrations. A secretive investigation into the attack has reportedly concluded, but there are fears its findings may never be publicly disclosed. The incident remains a point of international tension.", "time": "6:04 AM", "tag": null, "sensitivity": true, "image": null, "link": "https://www.theguardian.com/world/2026/jun/21/iran-school-bombing-minab-fears-trump-hegseth-bury-truth-investigation-findings"}, {"id": "w2", "lead": false, "kicker": "AFGHANISTAN", "headline": "The Women Running Businesses Under Taliban Rules", "sub": "With secondary education and most jobs out of reach, thousands of Afghan women have turned to entrepreneurship as the only path to make money and maintain a social life.", "summary": "Thousands of Afghan women are turning to entrepreneurship as their sole means of income and social engagement under Taliban rule. With secondary education and most traditional jobs inaccessible, these women are establishing businesses to support themselves and their families. This trend highlights their resilience in the face of severe restrictions.", "time": "Yesterday", "tag": null, "sensitivity": false, "image": "https://static01.nyt.com/images/2026/06/17/multimedia/00int-afghanistan-women-businesses-promo-qlph/00int-afghanistan-women-businesses-promo-qlph-superJumbo.jpg", "link": "https://www.nytimes.com/2026/06/21/world/asia/women-taliban-restrictions-jobs-education.html"}, {"id": "w3", "lead": false, "kicker": "GAZA", "headline": "Al Jazeera cameraman Ahmed Wishah killed in Israeli strike on Gaza", "sub": "Wishah among at least 260 journalists killed since Israel’s war on Gaza began in October 2023", "summary": "Al Jazeera cameraman Ahmed Wishah has been killed in an Israeli strike on Gaza, adding to the growing toll of journalists in the conflict. Wishah is among at least 260 journalists who have died since Israel's war on Gaza began in October 2023. His death underscores the extreme dangers faced by media professionals covering the region.", "time": "Yesterday", "tag": "WAR", "sensitivity": true, "image": null, "link": "https://www.theguardian.com/world/2026/jun/20/al-jazeera-cameraman-ahmed-wishah-killed-in-israeli-strike-on-gaza"}, {"id": "w4", "lead": false, "kicker": "IMMIGRATION", "headline": "Canada’s policies force asylum seekers into US to face deportation, critics say", "sub": "Advocates say the Safe Third Country Agreement forces immigrants to head to an unsafe country: the United States", "summary": "Critics argue that Canada's Safe Third Country Agreement compels asylum seekers to enter the United States, where they face potential deportation. Advocates contend that this policy pushes vulnerable immigrants into an unsafe country. The agreement has long been a point of contention for ons when and how individuals can cease to be solely influenced by their fathers' counsel.", "time": "6:00 AM", "tag": null, "sensitivity": false, "image": "https://media.guim.co.uk/74b20219814a060d50033d702a80d8e42cd07188/374_0_4250_3400/500.jpg", "link": "https://www.theguardian.com/commentisfree/2026/jun/20/fathers-advice-parenthood"}, {"id": "o4", "lead": false, "kicker": "JUSTICE", "headline": "You may not sympathise with the Elbit four’s methods. But you should be outraged by their treatment under the law | Geoffrey Robertson", "sub": "The jurors who found the pro-Palestine activists guilty of criminal damage had no idea their verdict would be treated as a verdict on terrorism, says Geoffrey Robertson KC", "summary": "Geoffrey Robertson KC argues that while one may not agree with the methods of the 'Elbit four' pro-Palestine activists, their legal treatment should provoke outrage. He states that jurors, who convicted them of criminal damage, were unaware their verdict would be interpreted as a terrorism ruling. Robertson highlights concerns about the application of law in politically charged cases.", "time": "Yesterday", "tag": "EDITORIAL", "sensitivity": true, "image": null, "link": "https://www.theguardian.com/global/commentisfree/2026/jun/20/elbit-four-law-jurors-criminal-damage-terrorism"}]}]}</script>

  <script>
    (function () {
      var raw = document.getElementById('edition').textContent;
      var data;
      try {
        data = JSON.parse(raw);
      } catch (e) {
        document.getElementById('app').innerHTML =
          '<div class="notice">No edition loaded. Run the build to generate today’s paper.</div>';
        return;
      }

      var state = { active: (data.sections[0] || {}).id, openId: null };

      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function weatherHtml(w) {
        if (!w || !w.icon) return '';
        var week = (w.week || []).map(function (d) {
          return '<div class="day"><div class="d">' + esc(d.day) + '</div>' +
            '<div class="i">' + esc(d.icon) + '</div>' +
            '<div class="hi">' + esc(d.hi) + '°</div>' +
            '<div class="lo">' + esc(d.lo) + '°</div></div>';
        }).join('');
        return '<div class="weather" id="weather">' +
          '<div class="summary">' +
            '<span class="ico">' + esc(w.icon) + '</span>' +
            '<span class="city">Toronto</span>' +
            '<span class="temp">' + esc(w.high) + '° / ' + esc(w.low) + '°</span>' +
            '<span class="muted">' + esc(w.condition) + '</span>' +
            '<span class="muted">Rain ' + esc(w.rain) + '</span>' +
            '<span class="muted">Wind ' + esc(w.wind) + '</span>' +
            '<span class="chev" id="wchev">▼</span>' +
          '</div>' +
          '<div class="week" id="wweek" style="display:none">' + week + '</div>' +
        '</div>';
      }

      function tabsHtml() {
        return '<div class="tabs">' + data.sections.map(function (s) {
          return '<button class="tab' + (s.id === state.active ? ' active' : '') +
            '" data-tab="' + esc(s.id) + '">' + esc(s.label) + '</button>';
        }).join('') + '</div>';
      }

      function cardHtml(st) {
        var open = st.id === state.openId;
        var tag = st.tag ? '<span class="tag">' + esc(st.tag) + '</span>' : '';
        var kicker = st.kicker ? '<div class="kicker">' + tag + esc(st.kicker) + '</div>' : '';
        var sub = st.sub ? '<div class="sub">' + esc(st.sub) + '</div>' : '';
        var expand = '';
        if (open) {
          var img = st.image ? '<img src="' + esc(st.image) + '" alt="" loading="lazy" />' : '';
          var link = st.link
            ? '<a class="readmore" href="' + esc(st.link) + '" target="_blank" rel="noopener">Read full story →</a>'
            : '';
          expand = '<div class="expand">' + img + esc(st.summary) + '<br>' + link + '</div>';
        }
        return '<div class="card' + (st.lead ? ' lead' : '') + (open ? ' open' : '') +
          '" data-card="' + esc(st.id) + '">' +
          '<div class="row"><div style="flex:1">' + kicker +
            '<div class="headline">' + esc(st.headline) + '</div>' + sub +
            '<div class="time">' + esc(st.time) + '</div></div>' +
            '<div class="toggle">' + (open ? '−' : '+') + '</div>' +
          '</div>' + expand +
        '</div>';
      }

      function storiesHtml() {
        var section = data.sections.filter(function (s) { return s.id === state.active; })[0];
        if (!section) return '';
        return '<div class="stories">' + section.stories.map(cardHtml).join('') + '</div>';
      }

      function render() {
        document.getElementById('app').innerHTML =
          '<div class="masthead">' +
            '<div class="date">' + esc(data.date) + '</div>' +
            '<div class="title">THE DAILY</div>' +
            '<div class="tagline">Toronto · World · Business · Sport</div>' +
          '</div>' +
          weatherHtml(data.weather) +
          tabsHtml() +
          storiesHtml() +
          '<div class="footer">THE DAILY · TORONTO · Tap any headline to read</div>';
        bind();
      }

      function bind() {
        var weather = document.getElementById('weather');
        if (weather) {
          weather.addEventListener('click', function () {
            var week = document.getElementById('wweek');
            var chev = document.getElementById('wchev');
            var showing = week.style.display !== 'none';
            week.style.display = showing ? 'none' : 'flex';
            chev.textContent = showing ? '▼' : '▲';
          });
        }
        Array.prototype.forEach.call(document.querySelectorAll('.tab'), function (btn) {
          btn.addEventListener('click', function () {
            state.active = btn.getAttribute('data-tab');
            state.openId = null;
            render();
          });
        });
        Array.prototype.forEach.call(document.querySelectorAll('.card'), function (card) {
          card.addEventListener('click', function (ev) {
            if (ev.target.closest('a')) return; // let the read-more link work
            var id = card.getAttribute('data-card');
            state.openId = state.openId === id ? null : id;
            render();
          });
        });
      }

      render();
    })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>

  <style>
    /* ---- Design tokens: The Morning Broadsheet ------------------------- */
    :root {
      --paper: #faf8f3;        /* the sheet (warm white, never #fff) */
      --desk: #efece6;         /* the desk beyond the column */
      --ink: #17130d;          /* headlines / primary text */
      --ink-sub: #453f38;      /* standfirsts */
      --ink-muted: #635d54;    /* inactive tabs */
      --meta: #6c665c;         /* timestamps, dateline, footer (>=AA small) */
      --rule: #dcd6cc;         /* hairline between cards */
      --rule-soft: #e3ded4;    /* hairline inside an opened card */
      --navy: #1a2744;         /* structural ink */
      --navy-ink: #1a2744;     /* navy used as text (links, active tab) */
      --red: #8b1a1a;          /* editorial heat */
      --tint-open: #f2ede4;    /* ground of an expanded card */
      --tint-analysis: #ece6da;/* ground of the why-it-matters note */
      --strip-bg: #1a2744;     /* weather strip */
      --strip-ink: #f7f4ee;
      --chip-hot: #8b1a1a;     /* DEVELOPING / WAR-class flags */
      --chip-cool: #1a2744;    /* procedural flags (FINAL, EDITORIAL) */
      --chip-ink: #faf8f3;
      --focus: #1a2744;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --paper: #151a22;      /* lamplight edition: deep navy-black paper */
        --desk: #0e1219;
        --ink: #e9e3d5;        /* cream ink */
        --ink-sub: #bcb6a8;
        --ink-muted: #948e82;
        --meta: #8f897d;
        --rule: #2a303a;
        --rule-soft: #2f3540;
        --navy: #6f82a8;       /* structure lifted so it reads on dark */
        --navy-ink: #a3b3d2;
        --red: #d1726b;        /* desaturated heat */
        --tint-open: #1b212b;
        --tint-analysis: #20262f;
        --strip-bg: #1b2334;
        --strip-ink: #e9e3d5;
        --chip-hot: #a8443c;
        --chip-cool: #3b4a6c;
        --chip-ink: #f0eadc;
        --focus: #a3b3d2;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 100%; }
    html, body { background: var(--desk); }
    body {
      font-family: 'Georgia', serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    #app {
      min-height: 100vh;
      min-height: 100svh;
      background: var(--paper);
      max-width: 680px;
      margin: 0 auto;
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    /* Masthead */
    .masthead {
      border-bottom: 4px solid var(--navy);
      padding: calc(18px + env(safe-area-inset-top)) 20px 14px;
      background: var(--paper);
    }
    .masthead .date {
      font-size: 0.6875rem; color: var(--meta); letter-spacing: 0.1em;
      text-transform: uppercase; margin-bottom: 4px;
    }
    .masthead .title {
      font-size: 2.375rem; font-weight: 700; letter-spacing: -0.01em;
      color: var(--navy); line-height: 1; margin-bottom: 2px;
    }
    .masthead .tagline {
      font-family: 'Arial', sans-serif; font-size: 0.625rem; color: var(--meta);
      letter-spacing: 0.18em; text-transform: uppercase;
    }

    /* Stale-edition ribbon */
    .stale {
      background: var(--tint-analysis); color: var(--meta);
      font-family: 'Arial', sans-serif; font-size: 0.625rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase; text-align: center;
      padding: 7px 20px;
    }

    /* Weather strip */
    .weather {
      background: var(--strip-bg); color: var(--strip-ink);
      cursor: pointer; user-select: none;
    }
    .weather .summary {
      display: flex; align-items: center; gap: 16px;
      padding: 10px 20px; overflow-x: auto; scrollbar-width: none;
      min-height: 44px;
    }
    .weather .summary::-webkit-scrollbar { display: none; }
    .weather .ico { font-size: 1.375rem; }
    .weather .city { font-weight: 700; font-size: 0.9375rem; }
    .weather .temp { font-size: 0.9375rem; }
    .weather .muted { opacity: 0.72; font-size: 0.8125rem; white-space: nowrap; }
    .weather .chev { margin-left: auto; opacity: 0.6; font-size: 0.75rem; }
    .weather .week {
      display: flex; border-top: 1px solid rgba(255,255,255,0.12);
      padding: 10px 20px; overflow-x: auto; scrollbar-width: none;
    }
    .weather .week::-webkit-scrollbar { display: none; }
    .weather .day {
      text-align: center; min-width: 52px; padding: 0 8px;
      border-right: 1px solid rgba(255,255,255,0.1);
    }
    .weather .day .d { font-size: 0.6875rem; opacity: 0.6; margin-bottom: 4px; }
    .weather .day .i { font-size: 1.125rem; }
    .weather .day .hi { font-size: 0.8125rem; font-weight: 700; margin-top: 4px; }
    .weather .day .lo { font-size: 0.6875rem; opacity: 0.5; }

    /* Tab nav */
    .tabs {
      display: flex; overflow-x: auto; border-bottom: 2px solid var(--navy);
      background: var(--paper); scrollbar-width: none;
      position: sticky; top: 0; z-index: 10;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; min-height: 44px; display: flex; align-items: center;
      padding: 0 18px; border: none; background: none; cursor: pointer;
      font-family: 'Arial', sans-serif; font-size: 0.6875rem; font-weight: 700;
      color: var(--ink-muted); border-bottom: 3px solid transparent;
      margin-bottom: -2px; letter-spacing: 0.12em; text-transform: uppercase;
      transition: color 0.15s;
    }
    .tab.active { color: var(--navy-ink); border-bottom-color: var(--navy); }

    /* Stories */
    .stories { padding: 8px 20px 40px; }
    .empty {
      padding: 40px 4px; text-align: center; color: var(--meta);
      font-style: italic; font-size: 0.9375rem;
    }
    .card {
      border-top: 1px solid var(--rule); padding: 14px 0; cursor: pointer;
      background: var(--paper); transition: background 0.15s;
    }
    .card.lead { border-top: 3px solid var(--navy); padding: 20px 0 16px; }
    .card.open { background: var(--tint-open); }
    .card:focus-visible { outline: 2px solid var(--focus); outline-offset: 3px; }
    .card .row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .card .row-main { flex: 1; min-width: 0; }
    .card .kicker {
      font-family: 'Arial', sans-serif; font-size: 0.625rem; font-weight: 700;
      letter-spacing: 0.12em; color: var(--red); margin-bottom: 6px; text-transform: uppercase;
    }
    .card .tag {
      color: var(--chip-ink); padding: 2px 6px; margin-right: 8px;
      font-size: 0.5625rem; border-radius: 2px; vertical-align: 1px;
    }
    .card .tag.hot { background: var(--chip-hot); }
    .card .tag.cool { background: var(--chip-cool); }
    .card .headline {
      font-size: 1.0625rem; font-weight: 700; line-height: 1.25; color: var(--ink); margin-bottom: 6px;
    }
    .card.lead .headline { font-size: 1.375rem; }
    .card .sub {
      font-size: 0.875rem; color: var(--ink-sub); line-height: 1.4; margin-bottom: 4px; font-style: italic;
    }
    .card .time { font-family: 'Arial', sans-serif; font-size: 0.6875rem; color: var(--meta); margin-top: 4px; }
    .card .toggle { color: var(--navy-ink); opacity: 0.5; font-size: 1.125rem; flex-shrink: 0; margin-top: 2px; }
    .card .expand {
      margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--rule-soft);
    }
    .card .expand .sumtext {
      font-size: 0.9375rem; color: var(--ink-sub); line-height: 1.7;
    }
    .card .expand img {
      display: block; width: 100%; aspect-ratio: 16 / 9; object-fit: cover;
      background: var(--tint-open); border-radius: 3px; margin-bottom: 12px;
    }
    .card .analysis {
      margin-top: 12px; padding: 10px 14px; background: var(--tint-analysis);
      font-size: 0.875rem; line-height: 1.6; color: var(--ink-sub); font-style: italic;
    }
    .card .analysis .alabel {
      display: block; font-family: 'Arial', sans-serif; font-style: normal;
      font-size: 0.625rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--navy-ink); margin-bottom: 4px;
    }
    .card .readmore {
      display: inline-block; margin-top: 12px; min-height: 44px; line-height: 44px;
      font-family: 'Arial', sans-serif; font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.04em; color: var(--navy-ink); text-decoration: none;
    }
    .card .readmore:hover { text-decoration: underline; }
    .card .readmore:focus-visible { outline: 2px solid var(--focus); outline-offset: 3px; }

    /* Footer */
    .footer {
      border-top: 2px solid var(--navy);
      padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
      font-family: 'Arial', sans-serif; font-size: 0.6875rem; color: var(--meta);
      text-align: center; letter-spacing: 0.06em;
    }
    .notice { padding: 40px 20px; text-align: center; color: var(--meta); font-style: italic; }

    @media (prefers-reduced-motion: reduce) {
      * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
    }
  </style>
</head>

ion. It prompts readers to consider the long-term strategic implications of current Middle East actions and the potential for unintended consequences.", "time": "10:00 AM", "tag": "EDITORIAL", "sensitivity": true, "image": null, "link": "https://www.theguardian.com/commentisfree/2026/jul/22/trump-iran-forever-war"}, {"id": "o2", "lead": false, "kicker": "US POLITICS", "headline": "Democrats Must Highlight Trump's Unprecedented Corruption", "sub": "Steven Greenhouse argues that to win midterm elections, the Democratic party needs to emphasize President Trump's financial gains amidst public struggles.", "summary": "Steven Greenhouse asserts that the Democratic party must aggressively campaign on President Trump's 'unprecedented corruption' to secure victory in this year's midterm elections. Greenhouse contends that Democrats should highlight how Trump has amassed vast financial gains while millions of Americans struggle to make ends meet.", "analysis": null, "time": "2:00 PM", "tag": "EDITORIAL", "sensitivity": false, "image": "https://media.guim.co.uk/042e31ca12a212b9a9e9366ee88c917ed2a73174/262_0_2617_2093/500.jpg", "link": "https://www.theguardian.com/commentisfree/2026/jul/22/democrats-trump-corruption-midterm-elections"}, {"id": "o3", "lead": false, "kicker": "UK POLITICS", "headline": "The Guardian View: A Powerful Centre is Needed to Decentralise Power", "sub": "An editorial argues that Prime Minister Andy Burnham appears to have learned from his predecessor's failures in driving a devolution agenda.", "summary": "An editorial from The Guardian posits that effective decentralization of power requires a strong central government. The piece suggests that Prime Minister Andy Burnham has learned important lessons from his predecessor's failures when it comes to driving a devolution agenda from No 10.", "analysis": null, "time": "5:30 PM", "tag": "EDITORIAL", "sensitivity": false, "image": "https://media.guim.co.uk/ead54440caecbb2c3898102de76ac53bc64b6ce1/388_0_3880_3104/500.jpg", "link": "https://www.theguardian.com/commentisfree/2026/jul/22/the-guardian-view-on-andy-burnham-and-devolution-it-takes-a-powerful-centre-to-decentralise-power"}, {"id": "o4", "lead": false, "kicker": "SOCIAL MEDIA", "headline": "In the Bizarre World of Short-Form Video, Nobody is Allowed to Take a Breath", "sub": "Adrian Chiles laments the relentless pace of social media videos, questioning where the assault on our senses will end.", "summary": "Adrian Chiles expresses his dismay at the frenetic pace of short-form video content, where pauses are routinely cut to shreds. He writes that he never thought he would miss punctuation so much, and questions the ultimate impact of this constant assault on our senses.", "analysis": null, "time": "3:05 PM", "tag": "EDITORIAL", "sensitivity": false, "image": "https://media.guim.co.uk/297317b092139bf567441b1d5c03ab78e30db6f0/235_0_5000_4000/500.jpg", "link": "https://www.theguardian.com/commentisfree/2026/jul/22/in-the-bizarre-world-of-short-form-video-nobody-is-allowed-to-take-a-breath"}]}]}</script>

  <script>
    (function () {
      var raw = document.getElementById('edition').textContent;
      var data;
      try {
        data = JSON.parse(raw);
      } catch (e) {
        document.getElementById('app').innerHTML =
          '<div class="notice">No edition loaded. Run the build to generate today’s paper.</div>';
        return;
      }

      var state = { active: (data.sections[0] || {}).id, openId: null };

      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      // Editorial heat flags keep the red chip; procedural flags cool to navy,
      // so a red chip still means something (the Scarce Red Rule).
      function isHotTag(t) {
        return /^(DEVELOPING|BREAKING|LIVE|WAR|ALERT|URGENT)$/i.test(t || '');
      }

      // Tagline reflects the sections the edition actually shipped, not a
      // hardcoded list that can disagree with the paper.
      function taglineText() {
        var labels = data.sections
          .filter(function (s) { return s.id !== 'front'; })
          .map(function (s) { return s.label; });
        return (labels.length ? labels : ['Toronto', 'World', 'Business']).join(' · ');
      }

      function weatherHtml(w) {
        if (!w || !w.icon) return '';
        var week = (w.week || []).map(function (d) {
          return '<div class="day"><div class="d">' + esc(d.day) + '</div>' +
            '<div class="i">' + esc(d.icon) + '</div>' +
            '<div class="hi">' + esc(d.hi) + '°</div>' +
            '<div class="lo">' + esc(d.lo) + '°</div></div>';
        }).join('');
        return '<div class="weather" id="weather" role="button" tabindex="0" ' +
          'aria-expanded="false" aria-label="Toronto weather, tap for the week">' +
          '<div class="summary">' +
            '<span class="ico">' + esc(w.icon) + '</span>' +
            '<span class="city">Toronto</span>' +
            '<span class="temp">' + esc(w.high) + '° / ' + esc(w.low) + '°</span>' +
            '<span class="muted">' + esc(w.condition) + '</span>' +
            '<span class="muted">Rain ' + esc(w.rain) + '</span>' +
            '<span class="muted">Wind ' + esc(w.wind) + '</span>' +
            '<span class="chev" id="wchev">▼</span>' +
          '</div>' +
          '<div class="week" id="wweek" style="display:none">' + week + '</div>' +
        '</div>';
      }

      function tabsHtml() {
        return '<div class="tabs" role="tablist">' + data.sections.map(function (s) {
          var on = s.id === state.active;
          return '<button class="tab' + (on ? ' active' : '') + '" role="tab" ' +
            'aria-selected="' + on + '" data-tab="' + esc(s.id) + '">' + esc(s.label) + '</button>';
        }).join('') + '</div>';
      }

      function cardHtml(st) {
        var open = st.id === state.openId;
        var tag = st.tag
          ? '<span class="tag ' + (isHotTag(st.tag) ? 'hot' : 'cool') + '">' + esc(st.tag) + '</span>'
          : '';
        var kicker = st.kicker ? '<div class="kicker">' + tag + esc(st.kicker) + '</div>' : '';
        var sub = st.sub ? '<div class="sub">' + esc(st.sub) + '</div>' : '';
        var expand = '';
        if (open) {
          var img = st.image
            ? '<img src="' + esc(st.image) + '" alt="' + esc(st.headline) + '" ' +
              'loading="lazy" onerror="this.remove()" />'
            : '';
          var analysis = st.analysis
            ? '<div class="analysis"><span class="alabel">Why it matters</span>' + esc(st.analysis) + '</div>'
            : '';
          var link = st.link
            ? '<a class="readmore" href="' + esc(st.link) + '" target="_blank" rel="noopener">Read full story →</a>'
            : '';
          expand = '<div class="expand">' + img +
            '<p class="sumtext">' + esc(st.summary) + '</p>' + analysis + link + '</div>';
        }
        return '<div class="card' + (st.lead ? ' lead' : '') + (open ? ' open' : '') +
          '" data-card="' + esc(st.id) + '" role="button" tabindex="0" ' +
          'aria-expanded="' + open + '">' +
          '<div class="row"><div class="row-main">' + kicker +
            '<div class="headline">' + esc(st.headline) + '</div>' + sub +
            '<div class="time">' + esc(st.time) + '</div></div>' +
            '<div class="toggle" aria-hidden="true">' + (open ? '−' : '+') + '</div>' +
          '</div>' + expand +
        '</div>';
      }

      function storiesInner() {
        var section = data.sections.filter(function (s) { return s.id === state.active; })[0];
        if (!section) return '';
        if (!section.stories || !section.stories.length) {
          return '<div class="empty">Nothing filed for ' + esc(section.label) + ' this morning.</div>';
        }
        return section.stories.map(cardHtml).join('');
      }

      // Quietly flag a saved (not-today) edition served from cache/offline.
      function staleRibbon() {
        try {
          var meta = document.querySelector('meta[name=build]');
          if (!meta) return '';
          var built = new Date(meta.getAttribute('content'));
          if (isNaN(built.getTime())) return '';
          var opt = { timeZone: 'America/Toronto' };
          if (built.toLocaleDateString('en-CA', opt) < new Date().toLocaleDateString('en-CA', opt)) {
            return '<div class="stale">Saved edition · ' + esc(data.date) + '</div>';
          }
        } catch (e) {}
        return '';
      }

      function appHtml() {
        return '<div class="masthead">' +
            '<div class="date">' + esc(data.date) + '</div>' +
            '<div class="title">THE DAILY</div>' +
            '<div class="tagline">' + esc(taglineText()) + '</div>' +
          '</div>' +
          staleRibbon() +
          weatherHtml(data.weather) +
          tabsHtml() +
          '<div class="stories" id="stories">' + storiesInner() + '</div>' +
          '<div class="footer">THE DAILY · TORONTO · Tap any headline to read</div>';
      }

      var app = document.getElementById('app');

      // Rebuild only the stories column; masthead, weather, and tab strip (and
      // their scroll/open state) are left untouched. This is what keeps a tap
      // from resetting the reader's place.
      function refreshStories() {
        document.getElementById('stories').innerHTML = storiesInner();
        bindCards();
      }

      function selectTab(id) {
        if (id === state.active) return;
        state.active = id;
        state.openId = null;
        var tabs = document.querySelectorAll('.tab');
        Array.prototype.forEach.call(tabs, function (t) {
          var on = t.getAttribute('data-tab') === id;
          t.classList.toggle('active', on);
          t.setAttribute('aria-selected', on);
          if (on) t.scrollIntoView({ inline: 'center', block: 'nearest' });
        });
        refreshStories();
        // Start the new section at the top, tab strip stuck under the notch.
        var tabsEl = document.querySelector('.tabs');
        if (tabsEl) window.scrollTo(0, tabsEl.offsetTop);
      }

      function toggleCard(id) {
        var y = window.scrollY;
        state.openId = state.openId === id ? null : id;
        refreshStories();
        window.scrollTo(0, y);   // grow/collapse in place, never jump
      }

      function bindWeather() {
        var weather = document.getElementById('weather');
        if (!weather) return;
        function toggle() {
          var week = document.getElementById('wweek');
          var chev = document.getElementById('wchev');
          var showing = week.style.display !== 'none';
          week.style.display = showing ? 'none' : 'flex';
          chev.textContent = showing ? '▼' : '▲';
          weather.setAttribute('aria-expanded', String(!showing));
        }
        weather.addEventListener('click', toggle);
        weather.addEventListener('keydown', function (ev) {
          if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); toggle(); }
        });
      }

      function bindTabs() {
        Array.prototype.forEach.call(document.querySelectorAll('.tab'), function (btn) {
          btn.addEventListener('click', function () { selectTab(btn.getAttribute('data-tab')); });
        });
      }

      function bindCards() {
        Array.prototype.forEach.call(document.querySelectorAll('.card'), function (card) {
          function activate(ev) {
            if (ev.target.closest('a')) return;                 // let the link work
            // While open, only the header row collapses it, so reading (and
            // selecting) the body never closes the story by accident.
            if (card.classList.contains('open') && !ev.target.closest('.row')) return;
            toggleCard(card.getAttribute('data-card'));
          }
          card.addEventListener('click', activate);
          card.addEventListener('keydown', function (ev) {
            if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); activate(ev); }
          });
        });
      }

      app.innerHTML = appHtml();
      bindWeather();
      bindTabs();
      bindCards();
    })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>

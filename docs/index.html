  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #efece6; }
    body {
      font-family: 'Georgia', serif;
      color: #111;
      -webkit-font-smoothing: antialiased;
    }
    #app {
      min-height: 100vh;
      background: #fff;
      max-width: 680px;
      margin: 0 auto;
    }

    /* Masthead */
    .masthead {
      border-bottom: 4px solid #1a2744;
      padding: 18px 20px 14px;
      background: #fff;
    }
    .masthead .date {
      font-size: 11px; color: #999; letter-spacing: 0.1em;
      text-transform: uppercase; margin-bottom: 4px;
    }
    .masthead .title {
      font-size: 38px; font-weight: 700; letter-spacing: -0.01em;

    }
    .masthead .tagline {
      font-family: 'Arial', sans-serif; font-size: 10px; color: #999;
      letter-spacing: 0.18em; text-transform: uppercase;
    }

    /* Weather strip */
    .weather {
      background: #1a2744; color: #fff; cursor: pointer; user-select: none;
    }
    .weather .summary {
      display: flex; align-items: center; gap: 16px;
      padding: 10px 20px; overflow-x: auto; scrollbar-width: none;
    }
    .weather .summary::-webkit-scrollbar { display: none; }
    .weather .ico { font-size: 22px; }
    .weather .city { font-weight: 700; font-size: 15px; }
    .weather .temp { font-size: 15px; }
    .weather .muted { opacity: 0.7; font-size: 13px; white-space: nowrap; }
    .weather .chev { margin-left: auto; opacity: 0.6; font-size: 12px; }
    .weather .week {
      display: flex; border-top: 1px solid rgba(255,255,255,0.12);
      padding: 10px 20px; overflow-x: auto; scrollbar-width: none;

    .weather .week::-webkit-scrollbar { display: none; }
    .weather .day {
      text-align: center; min-width: 52px; padding: 0 8px;
      border-right: 1px solid rgba(255,255,255,0.1);
    }
    .weather .day .d { font-size: 11px; opacity: 0.6; margin-bottom: 4px; }
    .weather .day .i { font-size: 18px; }
    .weather .day .hi { font-size: 13px; font-weight: 700; margin-top: 4px; }
    .weather .day .lo { font-size: 11px; opacity: 0.5; }

    /* Tab nav */
    .tabs {
      display: flex; overflow-x: auto; border-bottom: 2px solid #1a2744;
      background: #fff; scrollbar-width: none; position: sticky; top: 0; z-index: 10;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 12px 18px; border: none; background: none;
      cursor: pointer; font-family: 'Georgia', serif; font-size: 13px;
      font-weight: 400; color: #666; border-bottom: 3px solid transparent;
      margin-bottom: -2px; letter-spacing: 0.04em; text-transform: uppercase;
      transition: color 0.15s;
    }
    .tab.active { font-weight: 700; color: #1a2744; border-bottom-color: #1a2744; }

    /* Stories */
    .stories { padding: 0 20px 40px; }
    .card {
      border-top: 1px solid #ddd; padding: 14px 0; cursor: pointer;
      background: #fff; transition: background 0.15s;
    }
    .card.lead { border-top: 3px solid #1a2744; padding: 20px 0 16px; }

    .card .time { font-family: 'Arial', sans-serif; font-size: 11px; color: #999; margin-top: 4px; }
    .card .toggle { color: #bbb; font-size: 18px; flex-shrink: 0; margin-top: 2px; }
    .card .expand {
      margin-top: 14px; padding-top: 14px; border-top: 1px solid #e0ddd8;

    .card .readmore {

nsbury’s Chief Says Grocery Inflation Not as Bad as Feared So Far", "sub": "Supermarket has lifted sales with Aldi price match, and has benefited from hot weather and World Cup matches.", "summary": "Sainsbury's chief executive reports that grocery inflation has not been as severe as initially feared, partly due to the supermarket's Aldi price match strategy. The company has also seen increased sales, benefiting from recent hot weather and World Cup matches. These factors have helped mitigate the impact of rising costs on consumers.", "time": "9:52 AM", "tag": null, "sensitivity": false, "image": "https://media.guim.co.uk/fd2d1e48a1d24a0b3f8266437da2757fa414e668/495_153_3143_2515/500.jpg", "link": "https://www.theguardian.com/business/2026/jun/30/sainsburys-grocery-inflation-supermarket-aldi-price-match-world-cup"}, {"id": "b4", "lead": false, "kicker": "TECH", "headline": "How Grindr’s C.E.O. Adopted A.I.: ‘I Just Imposed It’", "sub": "George Arison, the gay dating app’s chief executive, is aiming for all code to be eventually written by artificial intelligence, making the company “leaner.”", "summary": "Grindr CEO George Arison has aggressively adopted AI, stating he 'just imposed it' on the company. His goal is for artificial intelligence to eventually write all of the gay dating app's code, aiming to make the company significantly 'leaner.' This move reflects a strong commitment to AI-driven efficiency and innovation within the tech firm.", "time": "5:00 AM", "tag": null, "sensitivity": false, "image": "https://static01.nyt.com/images/2026/07/04/multimedia/00Corneroffice-Grindr-lfwj/00Corneroffice-Grindr-lfwj-superJumbo.jpg", "link": "https://www.nytimes.com/2026/06/30/business/grindr-ceo-george-arison-ai.html"}]}, {"id": "opinion", "label": "Opinion", "stories": [{"id": "o1", "lead": true, "kicker": "US POLITICS", "headline": "The Supreme Court Has Again Undermined the Power of Congress", "sub": "The Trump v Slaughter decision allows the president further influence over agencies Congress itself created.", "summary": "The Supreme Court's 'Trump v Slaughter' decision has once again undermined the power of Congress, granting the president further influence over agencies originally created by the legislative branch. This ruling raises concerns about the balance of power and executive overreach. It reflects a continuing trend of judicial decisions impacting the separation of powers.", "time": "9:00 AM", "tag": "EDITORIAL", "sensitivity": false, "image": "https://media.guim.co.uk/6641b3ee85aa057e43a63fe9b55ae8d3b27c13ac/97_0_3332_2666/500.jpg", "link": "https://www.theguardian.com/commentisfree/2026/jun/30/supreme-court-trump-v-slaughter"}, {"id": "o2", "lead": false, "kicker": "UK POLITICS", "headline": "The Guardian View on Andy Burnham’s Speech: Rewiring Britain Needs Westminster to Give Up Real Power", "sub": "Editorial: The country’s likely next prime minister sketches a post-Thatcherite state built on radical devolution. The test is whether Whitehall yields.", "summary": "The Guardian's editorial argues that Andy Burnham's vision for 'rewiring Britain' through radical devolution requires Westminster to relinquish significant power. As a likely next prime minister, Burnham sketches a post-Thatcherite state, but the true test lies in whether Whitehall will yield to this shift. This editorial emphasizes the challenge of implementing such a transformative agenda.", "time": "Yesterday", "tag": "EDITORIAL", "sensitivity": false, "image": "https://media.guim.co.uk/f5d41563dbfb287f8d70786ff560eaac4b01557a/0_0_5156_4125/500.jpg", "link": "https://www.theguardian.com/commentisfree/2026/jun/29/the-guardian-view-on-andy-burnhams-speech-rewiring-britain-needs-westminster-to-give-up-real-power"}, {"id": "o3", "lead": false, "kicker": "MEDIA CRITIQUE", "headline": "It’s the Algorithms, Stupid: Why Karl Stefanovic Followed Joe Rogan in Building on Our Worst Instincts", "sub": "Day after day, people are forging lucrative careers just by picking up a microphone and camera and calling it news. What can we do about it?", "summary": "This opinion piece argues that algorithms are driving figures like Karl Stefanovic and Joe Rogan to capitalize on our worst instincts, creating lucrative careers by presenting opinion as news. The author questions what can be done to counter this trend of individuals using microphones and cameras to disseminate content. It highlights concerns about media integrity and the impact of algorithmic amplification.", "time": "Yesterday", "tag": null, "sensitivity": false, "image": "https://media.guim.co.uk/3f8bb695a3db59f869f1a928977c09531c5c2cd9/415_0_4136_3311/500.jpg", "link": "https://www.theguardian.com/commentisfree/2026/jun/30/its-the-algorithms-stupid-why-karl-stefanovic-followed-joe-rogan-in-building-on-our-worst-instincts"}, {"id": "o4", "lead": false, "kicker": "IRELAND", "headline": "Ireland Is Big Tech’s Lapdog – and That Compromises Its EU Presidency", "sub": "The country is dependent on the global giants that call Dublin home. Irish ministers can’t be trusted to chair vital European digital sovereignty talks, says Irish civil liberties campaigner Johnny Ryan.", "summary": "Irish civil liberties campaigner Johnny Ryan argues that Ireland's dependence on global tech giants, many headquartered in Dublin, compromises its EU presidency. He asserts that Irish ministers cannot be trusted to chair vital European digital sovereignty talks due to this reliance. The piece raises concerns about potential conflicts of interest and the nation's ability to act impartially.", "time": "4:00 AM", "tag": null, "sensitivity": false, "image": "https://media.guim.co.uk/467848479bcb47b2fece7f7cfd7991101c2caf86/736_0_5000_4000/500.jpg", "link": "https://www.theguardian.com/commentisfree/2026/jun/30/ireland-big-tech-lapdog-eu-presidency-digital-sovereignty"}]}]}</script>

  <script>
    (function () {
      var raw = document.getElementById('edition').textContent;
      var data;
      try {
        data = JSON.parse(raw);
      } catch (e) {
        document.getElementById('app').innerHTML =
          '<div class="notice">No edition loaded. Run the build to generate today’s paper.</div>';
        return;
      }

      var state = { active: (data.sections[0] || {}).id, openId: null };

      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function weatherHtml(w) {
        if (!w || !w.icon) return '';
        var week = (w.week || []).map(function (d) {
          return '<div class="day"><div class="d">' + esc(d.day) + '</div>' +
            '<div class="i">' + esc(d.icon) + '</div>' +
            '<div class="hi">' + esc(d.hi) + '°</div>' +
            '<div class="lo">' + esc(d.lo) + '°</div></div>';
        }).join('');
        return '<div class="weather" id="weather">' +
          '<div class="summary">' +
            '<span class="ico">' + esc(w.icon) + '</span>' +
            '<span class="city">Toronto</span>' +
            '<span class="temp">' + esc(w.high) + '° / ' + esc(w.low) + '°</span>' +
            '<span class="muted">' + esc(w.condition) + '</span>' +
            '<span class="muted">Rain ' + esc(w.rain) + '</span>' +
            '<span class="muted">Wind ' + esc(w.wind) + '</span>' +
            '<span class="chev" id="wchev">▼</span>' +
          '</div>' +
          '<div class="week" id="wweek" style="display:none">' + week + '</div>' +
        '</div>';
      }

      function tabsHtml() {
        return '<div class="tabs">' + data.sections.map(function (s) {
          return '<button class="tab' + (s.id === state.active ? ' active' : '') +
            '" data-tab="' + esc(s.id) + '">' + esc(s.label) + '</button>';
        }).join('') + '</div>';
      }

      function cardHtml(st) {
        var open = st.id === state.openId;
        var tag = st.tag ? '<span class="tag">' + esc(st.tag) + '</span>' : '';
        var kicker = st.kicker ? '<div class="kicker">' + tag + esc(st.kicker) + '</div>' : '';
        var sub = st.sub ? '<div class="sub">' + esc(st.sub) + '</div>' : '';
        var expand = '';
        if (open) {
          var img = st.image ? '<img src="' + esc(st.image) + '" alt="" loading="lazy" />' : '';
          var link = st.link
            ? '<a class="readmore" href="' + esc(st.link) + '" target="_blank" rel="noopener">Read full story →</a>'
            : '';
          expand = '<div class="expand">' + img + esc(st.summary) + '<br>' + link + '</div>';
        }
        return '<div class="card' + (st.lead ? ' lead' : '') + (open ? ' open' : '') +
          '" data-card="' + esc(st.id) + '">' +
          '<div class="row"><div style="flex:1">' + kicker +
            '<div class="headline">' + esc(st.headline) + '</div>' + sub +
            '<div class="time">' + esc(st.time) + '</div></div>' +
            '<div class="toggle">' + (open ? '−' : '+') + '</div>' +
          '</div>' + expand +
        '</div>';
      }

      function storiesHtml() {
        var section = data.sections.filter(function (s) { return s.id === state.active; })[0];
        if (!section) return '';
        return '<div class="stories">' + section.stories.map(cardHtml).join('') + '</div>';
      }

      function render() {
        document.getElementById('app').innerHTML =
          '<div class="masthead">' +
            '<div class="date">' + esc(data.date) + '</div>' +
            '<div class="title">THE DAILY</div>' +
            '<div class="tagline">Toronto · World · Business · Sport</div>' +
          '</div>' +
          weatherHtml(data.weather) +
          tabsHtml() +
          storiesHtml() +
          '<div class="footer">THE DAILY · TORONTO · Tap any headline to read</div>';
        bind();
      }

      function bind() {
        var weather = document.getElementById('weather');
        if (weather) {
          weather.addEventListener('click', function () {
            var week = document.getElementById('wweek');
            var chev = document.getElementById('wchev');
            var showing = week.style.display !== 'none';
            week.style.display = showing ? 'none' : 'flex';
            chev.textContent = showing ? '▼' : '▲';
          });
        }
        Array.prototype.forEach.call(document.querySelectorAll('.tab'), function (btn) {
          btn.addEventListener('click', function () {
            state.active = btn.getAttribute('data-tab');
            state.openId = null;
            render();
          });
        });
        Array.prototype.forEach.call(document.querySelectorAll('.card'), function (card) {
          card.addEventListener('click', function (ev) {
            if (ev.target.closest('a')) return; // let the read-more link work
            var id = card.getAttribute('data-card');
            state.openId = state.openId === id ? null : id;
            render();
          });
        });
      }

      render();
    })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>

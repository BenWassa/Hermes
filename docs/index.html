  <title>The Daily</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #efece6; }
    body {
      font-family: 'Georgia', serif;
      color: #111;
      -webkit-font-smoothing: antialiased;
    }
    #app {
      min-height: 100vh;
      background: #fff;
      max-width: 680px;
      margin: 0 auto;
    }

    /* Masthead */
    .masthead {
      border-bottom: 4px solid #1a2744;
      padding: 18px 20px 14px;
      background: #fff;
    }
    .masthead .date {
      font-size: 11px; color: #999; letter-spacing: 0.1em;
      text-transform: uppercase; margin-bottom: 4px;
    }
    .masthead .title {
      font-size: 38px; font-weight: 700; letter-spacing: -0.01em;
      color: #1a2744; line-height: 1; margin-bottom: 2px;
    }
    .masthead .tagline {
      font-family: 'Arial', sans-serif; font-size: 10px; color: #999;
      letter-spacing: 0.18em; text-transform: uppercase;
    }

    /* Weather strip */
    .weather {
      background: #1a2744; color: #fff; cursor: pointer; user-select: none;
    }
    .weather .summary {
      display: flex; align-items: center; gap: 16px;
      padding: 10px 20px; overflow-x: auto; scrollbar-width: none;
    }
    .weather .summary::-webkit-scrollbar { display: none; }
    .weather .ico { font-size: 22px; }
    .weather .city { font-weight: 700; font-size: 15px; }
    .weather .temp { font-size: 15px; }
    .weather .muted { opacity: 0.7; font-size: 13px; white-space: nowrap; }
    .weather .chev { margin-left: auto; opacity: 0.6; font-size: 12px; }
    .weather .week {
      display: flex; border-top: 1px solid rgba(255,255,255,0.12);
      padding: 10px 20px; overflow-x: auto; scrollbar-width: none;
    }
    .weather .week::-webkit-scrollbar { display: none; }
    .weather .day {
      text-align: center; min-width: 52px; padding: 0 8px;
      border-right: 1px solid rgba(255,255,255,0.1);
    }
    .weather .day .d { font-size: 11px; opacity: 0.6; margin-bottom: 4px; }
    .weather .day .i { font-size: 18px; }
    .weather .day .hi { font-size: 13px; font-weight: 700; margin-top: 4px; }
    .weather .day .lo { font-size: 11px; opacity: 0.5; }

    /* Tab nav */
    .tabs {
      display: flex; overflow-x: auto; border-bottom: 2px solid #1a2744;
      background: #fff; scrollbar-width: none; position: sticky; top: 0; z-index: 10;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 12px 18px; border: none; background: none;
      cursor: pointer; font-family: 'Georgia', serif; font-size: 13px;
      font-weight: 400; color: #666; border-bottom: 3px solid transparent;
      margin-bottom: -2px; letter-spacing: 0.04em; text-transform: uppercase;
      transition: color 0.15s;
    }
    .tab.active { font-weight: 700; color: #1a2744; border-bottom-color: #1a2744; }

    /* Stories */
    .stories { padding: 0 20px 40px; }
    .card {
      border-top: 1px solid #ddd; padding: 14px 0; cursor: pointer;
      background: #fff; transition: background 0.15s;
    }
    .card.lead { border-top: 3px solid #1a2744; padding: 20px 0 16px; }
    .card.open { background: #f8f7f4; }
    .card .row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .card .kicker {
      font-family: 'Arial', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; color: #8b1a1a; margin-bottom: 6px; text-transform: uppercase;
    }
    .card .tag {
      background: #8b1a1a; color: #fff; padding: 1px 6px; margin-right: 8px;
      font-size: 9px; border-radius: 2px;
    }
    .card .headline {
      font-size: 17px; font-weight: 700; line-height: 1.25; color: #111; margin-bottom: 6px;
    }
    .card.lead .headline { font-size: 22px; }
    .card .sub {
      font-size: 14px; color: #444; line-height: 1.4; margin-bottom: 4px; font-style: italic;
    }
    .card .time { font-family: 'Arial', sans-serif; font-size: 11px; color: #999; margin-top: 4px; }
    .card .toggle { color: #bbb; font-size: 18px; flex-shrink: 0; margin-top: 2px; }
    .card .expand {
      margin-top: 14px; padding-top: 14px; border-top: 1px solid #e0ddd8;
      font-size: 15px; color: #333; line-height: 1.7;
    }
    .card .expand img {
      display: block; width: 100%; height: auto; border-radius: 3px; margin-bottom: 12px;
    }
    .card .readmore {
      display: inline-block; margin-top: 12px; font-family: 'Arial', sans-serif;
      font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: #1a2744;
      text-decoration: none;
    }
    .card .readmore:hover { text-decoration: underline; }

    /* Footer */
    .footer {
      border-top: 2px solid #1a2744; padding: 16px 20px;
      font-family: 'Arial', sans-serif; font-size: 11px; color: #aaa;
      text-align: center; letter-spacing: 0.06em;
    }
    .notice { padding: 40px 20px; text-align: center; color: #999; font-style: italic; }
  </style>

": true, "image": null, "link": "https://www.nytimes.com/live/2026/06/25/weather/europe-heat-wave-uk-france"}, {"id": "f3", "lead": false, "kicker": "TORONTO", "headline": "Terrifying videos show teen hired-guns filming their own shooting rampage across Toronto area", "sub": "Teens opened fire on cinemas, a towing company, an elementary school, and a cannabis dispensary.", "summary": "Disturbing videos reveal teen hired-guns documenting their own shooting rampage across the Toronto area, targeting various public and commercial locations. The spree included attacks on cinemas, a towing company, an elementary school, and a cannabis dispensary, culminating in the murder of Sulakshan Selvasingam. This incident highlights a concerning escalation in local violent crime.", "time": "5:00 AM", "tag": "CRIME", "sensitivity": true, "image": null, "link": "https://www.thestar.com/news/gta/terrifying-videos-show-teen-hired-guns-filming-their-own-shooting-rampage-across-toronto-area/article_fc1089df-6d38-4717-9894-d2b9680f7335.html"}, {"id": "f4", "lead": false, "kicker": "BUSINESS", "headline": "Oil price falls to pre-Iran war levels as more tankers exit Strait of Hormuz", "sub": "Fears of a long-lasting energy crunch are receding as vessel traffic doubles in 24 hours.", "summary": "Oil prices have dropped to levels seen before the Iran war, as fears of a prolonged energy crunch diminish. Vessel traffic in the Strait of Hormuz has doubled in the past 24 hours, reaching its highest level since late February. This increased flow of tankers indicates a significant easing of supply concerns in the global market.", "time": "7:39 AM", "tag": "MARKETS", "sensitivity": false, "image": "https://media.guim.co.uk/de4b83fdc6aadd7139f78a68ff972dcead40d152/167_0_1711_1369/500.jpg", "link": "https://www.theguardian.com/business/2026/jun/25/oil-price-falls-pre-iran-war-levels-more-tankers-exit-strait-of-hormuz"}, {"id": "f5", "lead": false, "kicker": "MIDDLE EAST", "headline": "Israel says IDF is staying in southern Lebanon, undermining Iran peace talks", "sub": "Defence minister states troops will not withdraw, despite Tehran's view of an end to the war as part of a deal with the US.", "summary": "Israel's Defence Minister has declared that IDF troops will remain in southern Lebanon, directly contradicting Iran's position that an end to the war in Lebanon is part of a potential deal with the US. This statement undermines ongoing peace talks and signals continued military presence in the region. The decision is likely to exacerbate tensions and complicate diplomatic efforts.", "time": "Yesterday", "tag": "WAR", "sensitivity": true, "image": null, "link": "https://www.theguardian.com/world/2026/jun/24/israel-defence-minister-israel-katzrefuses-to-pull-out-of-southern-lebanon-undermining-iran-peace-talks"}]}, {"id": "toronto", "label": "Toronto", "stories": [{"id": "t1", "lead": true, "kicker": "CITY HALL", "headline": "Toronto council greenlights deal to cut development charges by up to 60 per cent", "sub": "City council discussed the finer details of the funding, under the Development Charge Reduction Program, at its Wednesday meeting.", "summary": "Toronto City Council has approved a deal to reduce development charges by up to 60 percent under the new Development Charge Reduction Program. The decision, finalized at Wednesday's meeting, aims to stimulate construction and address housing affordability. This move is expected to significantly impact future development projects across the city.", "time": "Yesterday", "tag": null, "sensitivity": false, "image": "https://bloximages.chicago2.vip.townnews.com/thestar.com/content/tncms/assets/v3/editorial/b/b8/bb83b2c3-2200-5bba-b072-894a9cf6a619/6a3c0dc5f1cb8.image.jpg?resize=300%2C200", "link": "https://www.thestar.com/real-estate/toronto-council-greenlights-deal-to-cut-development-charges-by-up-to-60-per-cent/article_f655126f-73c7-4bf4-8f88-c5b626758ebb.html"}, {"id": "t2", "lead": false, "kicker": "LOCAL NEWS", "headline": "When the CN Tower opened 50 years ago, there were secrets. These are the stories they couldn't tell you then", "sub": "High-stakes decisions and harrowing moments behind the construction of what would become an enduring symbol of Toronto.", "summary": "Fifty years after its opening, previously untold stories reveal the high-stakes decisions and harrowing moments behind the construction of Toronto's iconic CN Tower. These revelations shed new light on the challenges faced during its creation, detailing the human drama involved in building an enduring symbol of the city. The article uncovers secrets that were kept under wraps for decades.", "time": "5:00 AM", "tag": null, "sensitivity": false, "image": "https://bloximages.chicago2.vip.townnews.com/thestar.com/content/tncms/assets/v3/editorial/d/5c/d5c31708-9ac2-5a38-b9fa-1b54929cd26d/6a3434fd43d3b.image.jpg?resize=300%2C200", "link": "https://www.thestar.com/news/gta/these-are-the-stories-about-the-cn-tower-they-couldnt-tell-you-in-1976-when-it-opened-50-years-ago-this-week/article_ffaffc0b-af46-4659-9e18-3b95f6d28510.html"}, {"id": "t3", "lead": false, "kicker": "EDUCATION", "headline": "These Toronto students are getting kicked out of their school. They finally found out where they'll be going", "sub": "Students at Heydon Park Secondary, which serves girls with special needs, will relocate in January.", "summary": "Students from Heydon Park Secondary, a school for girls with special needs, have finally learned their new placement as they face relocation in January. Parents express significant concerns about the school's long-term future and the impact on their daughters' education. The move has generated anxiety among the school community.", "time": "5:00 AM", "tag": null, "sensitivity": false, "image": "https://bloximages.chicago2.vip.townnews.com/thestar.com/content/tncms/assets/v3/editorial/b/2b/b2b67abe-c66e-5425-b65f-1f9b3033b4dc/6a203cc49e5bb.image.jpg?resize=300%2C200", "link": "https://www.thestar.com/news/gta/these-toronto-students-are-getting-kicked-out-of-their-school-they-finally-found-out-where-theyll-be-going/article_241d054e-7d51-4026-880f-70f212bf8214.html"}, {"id": "t4", "lead": false, "kicker": "POLICE", "headline": "Thousands march in honour of slain Toronto officer amid deadly month for police: 'Give us all strength'", "sub": "A funeral was held Wednesday for Const. Marc Pinizzotto, an 18-year veteran with the Toronto Police Service, who was killed on June 11.", "summary": "Thousands gathered Wednesday for the funeral of Const. Marc Pinizzotto, an 18-year veteran of the Toronto Police Service, who was killed on June 11. The solemn procession honored the fallen officer amidst a month marked by multiple police fatalities. The community expressed grief and solidarity, calling for strength during this challenging time for law enforcement.", "time": "Yesterday", "tag": null, "sensitivity": true, "image": null, "link": "https://www.thestar.com/news/gta/thousands-march-in-honour-of-slain-toronto-officer-amid-deadly-month-for-police-give-us-all-strength/article_91932f43-db69-418e-bae8-d41e6961e92d.html"}]}, {"id": "world", "label": "World", "stories": [{"id": "w1", "lead": true, "kicker": "PAPUA NEW GUINEA", "headline": "Papua New Guinea at risk of food shortages as El Niño brings frost and drought", "sub": "Oxfam predicts PNG will be worst-hit country in Pacific from the weather pattern, with up to 3 million people affected nationwide.", "summary": "Papua New Guinea faces severe food shortages as the El Niño weather pattern brings widespread frost and drought across the nation. Oxfam predicts PNG will be the worst-hit country in the Pacific, with up to three million people potentially affected. This environmental crisis threatens to devastate agricultural output and exacerbate humanitarian concerns.", "time": "3:54 AM", "tag": null, "sensitivity": false, "image": "https://media.guim.co.uk/a9629128064a249473e8e8170670dcf08def51a2/577_0_6880_5504/500.jpg", "link": "https://www.theguardian.com/world/2026/jun/25/el-nino-pacific-papua-new-guinea-png-food-shortages"}, {"id": "w2", "lead": false, "kicker": "VATICAN", "headline": "Crisis looms for Pope Leo as splinter sect seeks to ordain far-right bishops", "sub": "Conflict threatens to worsen mounting tensions between the Vatican and rightwing Catholics in the US and globally.", "summary": "Pope Leo faces a looming crisis as a splinter sect seeks to ordain far-right bishops, threatening to escalate tensions between the Vatican and conservative Catholics globally. This move could deepen existing divisions within the church, particularly in the US. The Vatican is grappling with how to address this challenge to its authority.", "time": "11:00 AM", "tag": null, "sensitivity": false, "image": "https://media.guim.co.uk/db6f1be6d70db41fe15f105147d25e57a182b7ee/0_0_6827_5464/500.jpg", "link": "https://www.theguardian.com/world/2026/jun/25/pope-leo-far-right-bishops"}, {"id": "w3", "lead": false, "kicker": "CHINA", "headline": "As More Chinese Own Pets, Young People Stand Up for Animal Welfare", "sub": "Hundreds gathered in a rare demonstration after a man was filmed torturing dogs, marking a first civic action for many.", "summary": "A rare demonstration in China saw hundreds of young people protest animal cruelty after a video surfaced of a man torturing dogs. This public outcry, which police attempted to disperse, marks a significant moment for animal welfare advocacy in the country. For many participants, it was their first involvement in civic action, reflecting growing concern for pet welfare.", "time": "Yesterday", "tag": null, "sensitivity": false, "image": "https://static01.nyt.com/images/2026/06/23/00int-china-animal-rights-27289-cover/00int-china-animal-rights-27289-cover-superJumbo.jpg", "link": "https://www.nytimes.com/2026/06/25/world/asia/dog-animal-abuse-china-protest.html"}, {"id": "w4", "lead": false, "kicker": "AFGHANISTAN", "headline": "EU-Taliban talks spark outrage among Afghan women", "sub": "The decision to engage with the Taliban signals a profound shift in how the EU balances security and human rights.", "summary": "Talks between the EU and the Taliban have ignited outrage among Afghan women, who view the engagement as a betrayal of human rights. This decision signals a profound shift in the EU's approach, balancing security concerns with its commitment to human rights. Critics argue that legitimizing the Taliban undermines efforts to protect women's freedoms.", "time": "5:47 AM", "tag": null, "sensitivity": false, "image": "https://media.guim.co.uk/c27b05d0dce065dd3a877c572c9ec85e3b7adbe5/490_0_5000_4000/500.jpg", "link": "https://www.theguardian.com/world/2026/jun/25/thursday-briefing-why-eu-taliban-talks-have-sparked-outrage-among-afghan-women"}]}, {"id": "sports", "label": "Sports", "stories": [{"id": "s1", "lead": true, "kicker": "CRICKET", "headline": "England v New Zealand: third men’s Test, day one – live", "sub": "Ben Stokes returns as England captain for the deciding Test of the series, while New Zealand are without two key players.", "summary": "England faces New Zealand on day one of the third men's Test, with Ben Stokes returning as captain for the series decider. New Zealand is significantly hampered by the absence of two key players, setting the stage for a high-stakes match. The outcome could heavily influence the future direction of English cricket.", "time": "11:05 AM", "tag": "LIVE", "sensitivity": false, "image": "https://media.guim.co.uk/eea66fd4fb444bc6401a64a960c82b7b6def163a/473_0_2750_2200/500.jpg", "link": "https://www.theguardian.com/sport/live/2026/jun/25/england-v-new-zealand-third-mens-test-day-one-live"}, {"id": "s2", "lead": false, "kicker": "TENNIS", "headline": "Tennis stars’ protests over prize money share to continue at Wimbledon", "sub": "Players want 16% of revenue, up from 14.4%, and will limit media time to press their demands.", "summary": "Tennis stars are set to continue their protests over prize money at Wimbledon, demanding an increase in their share of revenue from 14.4% to 16%. To highlight their demands, players plan to limit their time with the media. This ongoing dispute underscores tensions between athletes and tournament organizers regarding financial compensation.", "time": "Yesterday", "tag": null, "sensitivity": false, "image": "https://media.guim.co.uk/6161128236aa357fc868b48eff3f73b31425f0ab/758_0_4268_3414/500.jpg", "link": "https://www.theguardian.com/sport/2026/jun/24/players-protests-over-prize-money-share-to-continue-at-wimbledon"}, {"id": "s3", "lead": false, "kicker": "OLYMPICS", "headline": "IOC scraps 130 years of tradition by paying athletes $10,000 at Olympics", "sub": "The IOC set up a £106m fund to pay a grant of $10,000 to every athlete, six months after competing.", "summary": "The International Olympic Committee (IOC) has broken 130 years of tradition by announcing it will pay athletes $10,000 each, six months after competing. A £106 million fund has been established to provide this grant to every Olympian. This historic decision aims to support athletes financially, marking a significant shift in Olympic policy.", "time": "Yesterday", "tag": null, "sensitivity": false, "image": "https://media.guim.co.uk/bcb139e0250e702ad63b5fcf7473ab2ed0773b79/539_0_4680_3744/500.jpg", "link": "https://www.theguardian.com/sport/2026/jun/24/ioc-pay-olympic-athletes-10000-dollars"}, {"id": "s4", "lead": false, "kicker": "RUGBY", "headline": "Qatar Airways puts Nations Championship sponsorship on hold due to fallout from war", "sub": "The £80m sponsorship of rugby union’s new Nations Championship is on hold due to the Middle East conflict.", "summary": "Qatar Airways has suspended its £80 million sponsorship of rugby union’s new Nations Championship, citing fallout from the ongoing war in the Middle East. This decision places the future funding of the championship in uncertainty. The conflict's broader economic and po  for Muslim communities.", "time": "Yesterday", "tag": "EDITORIAL", "sensitivity": false, "image": "https://media.guim.co.uk/8bf1bbb285891405366143efcc061dc1aa2415d1/0_1888_4490_3591/500.jpg", "link": "https://www.theguardian.com/commentisfree/2026/jun/24/the-guardian-view-on-islamophobia-political-rhetoric-is-fuelling-hate"}]}]}</script>

  <script>
    (function () {
      var raw = document.getElementById('edition').textContent;
      var data;
      try {
        data = JSON.parse(raw);
      } catch (e) {
        document.getElementById('app').innerHTML =
          '<div class="notice">No edition loaded. Run the build to generate today’s paper.</div>';
        return;
      }

      var state = { active: (data.sections[0] || {}).id, openId: null };

      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function weatherHtml(w) {
        if (!w || !w.icon) return '';
        var week = (w.week || []).map(function (d) {
          return '<div class="day"><div class="d">' + esc(d.day) + '</div>' +
            '<div class="i">' + esc(d.icon) + '</div>' +
            '<div class="hi">' + esc(d.hi) + '°</div>' +
            '<div class="lo">' + esc(d.lo) + '°</div></div>';
        }).join('');
        return '<div class="weather" id="weather">' +
          '<div class="summary">' +
            '<span class="ico">' + esc(w.icon) + '</span>' +
            '<span class="city">Toronto</span>' +
            '<span class="temp">' + esc(w.high) + '° / ' + esc(w.low) + '°</span>' +
            '<span class="muted">' + esc(w.condition) + '</span>' +
            '<span class="muted">Rain ' + esc(w.rain) + '</span>' +
            '<span class="muted">Wind ' + esc(w.wind) + '</span>' +
            '<span class="chev" id="wchev">▼</span>' +
          '</div>' +
          '<div class="week" id="wweek" style="display:none">' + week + '</div>' +
        '</div>';
      }

      function tabsHtml() {
        return '<div class="tabs">' + data.sections.map(function (s) {
          return '<button class="tab' + (s.id === state.active ? ' active' : '') +
            '" data-tab="' + esc(s.id) + '">' + esc(s.label) + '</button>';
        }).join('') + '</div>';
      }

      function cardHtml(st) {
        var open = st.id === state.openId;
        var tag = st.tag ? '<span class="tag">' + esc(st.tag) + '</span>' : '';
        var kicker = st.kicker ? '<div class="kicker">' + tag + esc(st.kicker) + '</div>' : '';
        var sub = st.sub ? '<div class="sub">' + esc(st.sub) + '</div>' : '';
        var expand = '';
        if (open) {
          var img = st.image ? '<img src="' + esc(st.image) + '" alt="" loading="lazy" />' : '';
          var link = st.link
            ? '<a class="readmore" href="' + esc(st.link) + '" target="_blank" rel="noopener">Read full story →</a>'
            : '';
          expand = '<div class="expand">' + img + esc(st.summary) + '<br>' + link + '</div>';
        }
        return '<div class="card' + (st.lead ? ' lead' : '') + (open ? ' open' : '') +
          '" data-card="' + esc(st.id) + '">' +
          '<div class="row"><div style="flex:1">' + kicker +
            '<div class="headline">' + esc(st.headline) + '</div>' + sub +
            '<div class="time">' + esc(st.time) + '</div></div>' +
            '<div class="toggle">' + (open ? '−' : '+') + '</div>' +
          '</div>' + expand +
        '</div>';
      }

      function storiesHtml() {
        var section = data.sections.filter(function (s) { return s.id === state.active; })[0];
        if (!section) return '';
        return '<div class="stories">' + section.stories.map(cardHtml).join('') + '</div>';
      }

      function render() {
        document.getElementById('app').innerHTML =
          '<div class="masthead">' +
            '<div class="date">' + esc(data.date) + '</div>' +
            '<div class="title">THE DAILY</div>' +
            '<div class="tagline">Toronto · World · Business · Sport</div>' +
          '</div>' +
          weatherHtml(data.weather) +
          tabsHtml() +
          storiesHtml() +
          '<div class="footer">THE DAILY · TORONTO · Tap any headline to read</div>';
        bind();
      }

      function bind() {
        var weather = document.getElementById('weather');
        if (weather) {
          weather.addEventListener('click', function () {
            var week = document.getElementById('wweek');
            var chev = document.getElementById('wchev');
            var showing = week.style.display !== 'none';
            week.style.display = showing ? 'none' : 'flex';
            chev.textContent = showing ? '▼' : '▲';
          });
        }
        Array.prototype.forEach.call(document.querySelectorAll('.tab'), function (btn) {
          btn.addEventListener('click', function () {
            state.active = btn.getAttribute('data-tab');
            state.openId = null;
            render();
          });
        });
        Array.prototype.forEach.call(document.querySelectorAll('.card'), function (card) {
          card.addEventListener('click', function (ev) {
            if (ev.target.closest('a')) return; // let the read-more link work
            var id = card.getAttribute('data-card');
            state.openId = state.openId === id ? null : id;
            render();
          });
        });
      }

      render();
    })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>

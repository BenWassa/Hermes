<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#fff"/>
  <rect x="40" y="40" width="432" height="432" fill="none" stroke="#1a2744" stroke-width="14"/>
  <!-- Masthead rule -->
  <rect x="40" y="165" width="432" height="12" fill="#1a2744"/>
  <!-- Title: THE DAILY -->
  <text x="256" y="152" font-family="Georgia, serif" font-size="68" font-weight="700" fill="#1a2744" text-anchor="middle" letter-spacing="-1">THE DAILY</text>
  <!-- Tagline -->
  <text x="256" y="202" font-family="Arial, sans-serif" font-size="18" fill="#999" text-anchor="middle" letter-spacing="4">TORONTO · WORLD · SPORT</text>
  <!-- Lead headline rules -->
  <rect x="72" y="222" width="368" height="8" fill="#1a2744" rx="2"/>
  <rect x="72" y="242" width="300" height="6" fill="#ccc" rx="2"/>
  <rect x="72" y="258" width="330" height="6" fill="#ccc" rx="2"/>
  <rect x="72" y="274" width="250" height="6" fill="#ccc" rx="2"/>
  <!-- Divider -->
  <rect x="72" y="298" width="368" height="2" fill="#ddd"/>
  <!-- Second story rules -->
  <rect x="72" y="314" width="280" height="6" fill="#bbb" rx="2"/>
  <rect x="72" y="330" width="220" height="6" fill="#bbb" rx="2"/>
  <!-- Third story rules -->
  <rect x="72" y="358" width="260" height="5" fill="#ccc" rx="2"/>
  <rect x="72" y="372" width="200" height="5" fill="#ccc" rx="2"/>
  <!-- Footer rule -->
  <rect x="40" y="432" width="432" height="10" fill="#1a2744"/>
</svg>
